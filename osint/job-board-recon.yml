settings:
  name: "Job Board Recon: Security hiring gap analysis"
  description: "Identifies security team gaps by searching for open security-related hiring positions via the Adzuna Jobs API. Requires ADZUNA_ID and ADZUNA_KEY."
  image: debian
  author:
    - https://github.com/satorici
  example: satori run satori://osint/job-board-recon.yml -d COMPANY="NCC Group" -d ADZUNA_ID="your_id" -d ADZUNA_KEY="your_key" --report --output
  redacted:
    - ADZUNA_KEY

job-board-recon:
  install:
    - export DEBIAN_FRONTEND=noninteractive && apt-get update -qq && apt-get install -qy curl jq ca-certificates >>/dev/null

  security_jobs:
    assertReturnCode: 0
    run:
      - |
        echo "=== Security Hiring Analysis: ${{COMPANY}} ==="
        ENCODED=$(echo "${{COMPANY}}" | sed 's/ /+/g')
        FOUND=0
        for TERM in "cybersecurity" "security+engineer" "SOC+analyst" "CISO" "information+security" "penetration+tester"; do
          RESULT=$(curl -s "https://api.adzuna.com/v1/api/jobs/gb/search/1?app_id=${{ADZUNA_ID}}&app_key=${{ADZUNA_KEY}}&what=${ENCODED}+${TERM}&results_per_page=5")
          COUNT=$(echo "$RESULT" | jq '.count // 0')
          if [ "$COUNT" -gt 0 ]; then
            echo "--- $TERM: $COUNT job(s) ---"
            echo "$RESULT" | jq -r '.results[] | "  \(.title) | \(.company.display_name) | \(.location.display_name) | \(.created)"' 2>/dev/null
            FOUND=$((FOUND + COUNT))
          fi
        done
        if [ "$FOUND" -eq 0 ]; then
          echo "No security roles found for ${{COMPANY}}"
        else
          echo "=== $FOUND security role(s) found ==="
        fi
