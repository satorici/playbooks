settings:
  name: "Ransomware Check: Ransomware victim history"
  description: "Checks if a company or domain has been published as a ransomware victim, using the ransomware.live v2 API which indexes victims across ~100 ransomware leak sites (live, fresher than a static dump). Returns ransomware group, dates, country, sector, and whether the victim also appeared in infostealer logs. No API key required."
  image: debian
  author:
    - https://github.com/satorici
  example: satori run osint/ransomware-check.yml -d DOMAIN="colonialkc.org" -d COMPANY="Colonial" --report --output

ransomware-check:
  install:
    - command -v curl >/dev/null 2>&1 && command -v jq >/dev/null 2>&1 || (export DEBIAN_FRONTEND=noninteractive && apt-get update -qq && apt-get install -qy curl jq ca-certificates >/dev/null 2>&1)

  search:
    setSeverity: 1
    assertStdoutNotContains: "RANSOMWARE_VICTIM"
    run:
      - |
        DOMAIN=$(echo "${{DOMAIN}}" | tr '[:upper:]' '[:lower:]')
        COMPANY="${{COMPANY}}"
        CL=$(echo "$COMPANY" | tr '[:upper:]' '[:lower:]')
        BASE=$(echo "$DOMAIN" | cut -d. -f1)
        echo "=== Ransomware Victim Check: $COMPANY ($DOMAIN) ==="
        echo "(searches ransomware.live across ~100 leak sites)"
        echo ""
        QC=$(echo "$COMPANY" | sed "s/ /%20/g")
        norm() { echo "$1" | jq -c 'if type=="array" then . else [] end' 2>/dev/null || echo "[]"; }
        A1=$(norm "$(curl -s --max-time 30 "https://api.ransomware.live/v2/searchvictims/$QC")")
        A2=$(norm "$(curl -s --max-time 30 "https://api.ransomware.live/v2/searchvictims/$BASE")")
        ALL=$(jq -n --argjson a "${A1:-[]}" --argjson b "${A2:-[]}" '$a + $b' 2>/dev/null)
        MATCH=$(echo "$ALL" | jq --arg d "$DOMAIN" --arg b "$BASE" --arg c "$CL" '[ .[] | select( ((.domain // "")|ascii_downcase|contains($d)) or ((.domain // "")|ascii_downcase|contains($b)) or ((.victim // "")|ascii_downcase|contains($c)) ) ] | unique_by((.victim // "") + (.group // "") + (.discovered // ""))' 2>/dev/null)
        N=$(echo "$MATCH" | jq 'length' 2>/dev/null)
        if [ "${N:-0}" -gt 0 ]; then
          echo "RANSOMWARE_VICTIM: $N incident(s) found"
          echo "$MATCH" | jq -r '.[] | "  group=\(.group // "?") | victim=\(.victim) | domain=\(.domain // "?") | date=\((.discovered // .attackdate // "")[0:10]) | country=\(.country // "?") | sector=\(.activity // "?") | infostealer=\(.infostealer // false)"'
        else
          echo "NO_RANSOMWARE_HISTORY: $COMPANY ($DOMAIN) not found in ransomware.live"
        fi
