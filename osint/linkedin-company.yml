settings:
  name: "LinkedIn Company Intelligence: Profile, hiring, and competitors"
  description: "Enriches company data via Proxycurl (nubela.co, LinkedIn data) and Adzuna Jobs API. Returns company profile, specialties, funding history, and open security roles."
  image: debian
  author:
    - https://github.com/satorici
  example: satori run satori://osint/linkedin-company.yml -d DOMAIN="quorumcyber.com" -d COMPANY="Quorum Cyber" -d PROXYCURL="your_key" -d ADZUNA_ID="your_id" -d ADZUNA_KEY="your_key" --report --output
  redacted:
    - PROXYCURL
    - ADZUNA_KEY

linkedin-company:
  install:
    - command -v curl >/dev/null 2>&1 && command -v jq >/dev/null 2>&1 || (export DEBIAN_FRONTEND=noninteractive && apt-get update -qq && apt-get install -qy curl jq ca-certificates >>/dev/null)

  company_profile:
    assertReturnCode: 0
    run:
      - |
        echo "=== Company Profile: ${{COMPANY}} ==="
        RESULT=$(curl -s "https://nubela.co/api/v1/company/details?website=${{DOMAIN}}" \
          -H "Authorization: Bearer ${{PROXYCURL}}")
        # Surface API errors instead of swallowing them with 2>/dev/null
        if echo "$RESULT" | jq -e 'has("error")' >/dev/null 2>&1; then
          echo "Proxycurl error: $(echo "$RESULT" | jq -r '.error // .description // "unknown error"')"
        else
          echo "$RESULT" | jq '{
            name: .name,
            description: .description,
            tagline: .tagline,
            type: .company_type,
            founded: .founded_year,
            industry: .industry,
            specialties: .specialties,
            address: .addresses[0],
            twitter: .twitter_url,
            facebook: .facebook_url,
            instagram: .instagram_url
          }'
        fi

  funding:
    assertReturnCode: 0
    run:
      - |
        echo "=== Funding History: ${{COMPANY}} ==="
        RESULT=$(curl -s "https://nubela.co/api/v1/company/funding?website=${{DOMAIN}}" \
          -H "Authorization: Bearer ${{PROXYCURL}}")
        if echo "$RESULT" | jq -e 'has("error")' >/dev/null 2>&1; then
          echo "Proxycurl error: $(echo "$RESULT" | jq -r '.error // .description // "unknown error"')"
        elif [ "$(echo "$RESULT" | jq '(.funding_rounds | length) // 0')" = "0" ]; then
          echo "No funding data available"
        else
          echo "$RESULT" | jq -r '
            "Total raised: $\(.total_funds_raised_usd // "undisclosed")",
            (.funding_rounds[]? | "  \(.date) | \(.round_type) | $\(.amount_usd // "undisclosed") | Investors: \([.investors[]?.name] | join(", "))")'
        fi

  security_jobs:
    assertReturnCode: 0
    run:
      - |
        echo "=== Security Hiring: ${{COMPANY}} ==="
        # Adzuna treats what as AND-matched keywords, so jamming the company
        # name plus a role term into what matches nothing. Search the company
        # postings via what_phrase (exact company name), then filter the
        # results for security-related titles client side.
        ENCODED=$(echo "${{COMPANY}}" | sed 's/ /%20/g')
        RESULT=$(curl -s "https://api.adzuna.com/v1/api/jobs/gb/search/1?app_id=${{ADZUNA_ID}}&app_key=${{ADZUNA_KEY}}&what_phrase=${ENCODED}&results_per_page=50&content-type=application/json")
        # Adzuna returns an `exception` field on auth/quota errors
        if echo "$RESULT" | jq -e 'has("exception")' >/dev/null 2>&1; then
          echo "Adzuna error: $(echo "$RESULT" | jq -r '.exception')"
          exit 1
        fi
        SEC='cyber|security|soc|ciso|infosec|penetration|pentest|threat|incident|vulnerab|malware|forensic|detection'
        MATCHED=$(echo "$RESULT" | jq -r --arg co "${{COMPANY}}" --arg sec "$SEC" '
          .results[]?
          | select((.company.display_name // "") | ascii_downcase | contains($co | ascii_downcase))
          | select((.title // "") | ascii_downcase | test($sec))
          | "  \(.title) | \(.company.display_name) | \(.location.display_name) | \(.created)"')
        if [ -n "$MATCHED" ]; then
          COUNT=$(printf '%s\n' "$MATCHED" | grep -c .)
          echo "$MATCHED"
          echo "=== $COUNT security role(s) found ==="
        else
          TOTAL=$(echo "$RESULT" | jq '.count // 0')
          echo "No security roles found for ${{COMPANY}} (${TOTAL} total open role(s) matched the company)"
        fi
