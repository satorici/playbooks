settings:
  name: "Crunchbase Company Intelligence: Profile, funding, and key people"
  description: "Uses Camoufox stealth browser with a residential proxy to bypass Cloudflare and extract company data from Crunchbase."
  image: python:3.12-slim
  timeout: 600
  memory: 8192
  cpu: 4096
  author:
    - https://github.com/satorici
  gallery:
    - https://files.catbox.moe/placeholder.png
  example: satori run satori://osint/crunchbase.yml -d COMPANY="Quorum Cyber" -d PROXY_URL="http://user:pass@geo.iproyal.com:12321" --report --output
  redacted:
    - PROXY_URL

crunchbase:
  install:
    - apt-get update -qq && apt-get install -qy xvfb fonts-liberation libgtk-3-0 libdbus-glib-1-2 libasound2t64 2>/dev/null | tail -1
    - pip install -q camoufox 2>/dev/null && python3 -m camoufox fetch 2>/dev/null | tail -1

  scrape:
    assertReturnCode: 0
    assertStdout: true
    run:
      - |
        python3 << 'PYEOF'
        import json,sys,time
        from urllib.parse import urlparse
        from camoufox.sync_api import Camoufox
        COMPANY="${{COMPANY}}"
        PROXY="${{PROXY_URL}}"
        SLUG=COMPANY.lower().replace(" ","-")
        api_data=[]
        def on_resp(r):
            if "/v4/" in r.url and r.status==200:
                try: api_data.append({"p":r.url.split("?")[0].replace("https://www.crunchbase.com",""),"d":r.json()})
                except: pass
        pcfg=None
        if PROXY:
            pu=urlparse(PROXY)
            pcfg={"server":pu.scheme+"://"+pu.hostname+":"+str(pu.port)}
            if pu.username: pcfg["username"]=pu.username
            if pu.password: pcfg["password"]=pu.password
        url="https://www.crunchbase.com/organization/"+SLUG
        print("=== "+COMPANY+" ===",flush=True)
        with Camoufox(headless="virtual",proxy=pcfg) as br:
            pg=br.new_page()
            pg.on("response",on_resp)
            for attempt in range(50):
                print("Try "+str(attempt+1),flush=True)
                api_data.clear()
                pg.goto(url,timeout=45000)
                for i in range(12):
                    pg.wait_for_timeout(3000)
                    pg.mouse.move(400+i*50,300+i*30)
                    pg.wait_for_timeout(1000)
                    pg.mouse.click(500,400)
                    pg.wait_for_timeout(1000)
                    b=pg.inner_text("body")
                    if "verify" not in b.lower() and "been blocked" not in b.lower() and len(b)>500:
                        print("OK attempt "+str(attempt+1),flush=True)
                        for ln in [l.strip() for l in b.split("\n") if l.strip() and len(l.strip())>3][:200]:
                            print(ln,flush=True)
                        if api_data:
                            print("\n=== API ===",flush=True)
                            for it in api_data:
                                if "md/app" not in it["p"]:
                                    print(it["p"],flush=True)
                                    print(json.dumps(it["d"],indent=2,default=str)[:4000],flush=True)
                        sys.exit(0)
                pg.context.clear_cookies()
        sys.exit(1)
        PYEOF
