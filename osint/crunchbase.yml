settings:
  name: "Crunchbase Company Intelligence: Profile, funding, and key people"
  description: "Solves Cloudflare challenge via CapSolver and extracts company profile, funding rounds, key people, and products from Crunchbase using a residential proxy."
  image: python:3.12-slim
  timeout: 120
  author:
    - https://github.com/satorici
  gallery:
    - https://files.catbox.moe/placeholder.png
  example: satori run satori://osint/crunchbase.yml -d COMPANY="Quorum Cyber" -d PROXY_URL="http://user:pass@geo.iproyal.com:12321" -d CAPSOLVER="your_key" --report --output
  redacted:
    - PROXY_URL
    - CAPSOLVER

crunchbase:
  install:
    - pip install -q requests curl_cffi 2>/dev/null

  scrape:
    assertReturnCode: 0
    assertStdout: true
    run:
      - |
        python3 << 'PYEOF'
        import json,sys,time,requests
        from curl_cffi import requests as cffi_requests

        COMPANY="${{COMPANY}}"
        PROXY="${{PROXY_URL}}"
        CAPSOLVER="${{CAPSOLVER}}"
        import random,string
        from urllib.parse import urlparse
        SLUG=COMPANY.lower().replace(" ","-")
        CB_URL="https://www.crunchbase.com/organization/"+SLUG
        ORIG_PROXY=PROXY

        print("=== "+COMPANY+" ===",flush=True)

        # Step 1: Solve Cloudflare challenge via CapSolver (retry with new IPs)
        token=None
        for attempt in range(10):
            sid="".join(random.choices(string.ascii_lowercase+string.digits,k=8))
            pu=urlparse(ORIG_PROXY)
            pw=(pu.password or "").split("_session")[0]+"_session-"+sid+"_lifetime-5m"
            proxy_url=pu.scheme+"://"+pu.username+":"+pw+"@"+pu.hostname+":"+str(pu.port)
            print("Try "+str(attempt+1)+"/10 session="+sid,flush=True)
            r=requests.post("https://api.capsolver.com/createTask",json={"clientKey":CAPSOLVER,"task":{"type":"AntiCloudflareTask","websiteURL":CB_URL,"proxy":proxy_url}})
            t=r.json()
            if t.get("errorId",1)!=0:
                print("  err: "+t.get("errorDescription","")[:60],flush=True); continue
            tid=t["taskId"]
            for _ in range(30):
                time.sleep(5)
                r=requests.post("https://api.capsolver.com/getTaskResult",json={"clientKey":CAPSOLVER,"taskId":tid})
                res=r.json()
                if res.get("status")=="ready":
                    sol=res["solution"]
                    token=sol.get("token","")
                    ua=sol.get("userAgent","")
                    cookies=sol.get("cookies",{})
                    PROXY=proxy_url
                    print("  Solved! UA: "+ua[:60],flush=True)
                    break
                elif res.get("status")!="processing":
                    print("  fail: "+res.get("errorDescription","")[:60],flush=True); break
            if token: break
        if not token:
            print("ERROR: could not solve after 10 attempts",flush=True); sys.exit(1)

        # Step 2: Fetch page — retry full solve+fetch if 403 (IP mismatch)
        import re
        for fetch_try in range(3):
            print("Fetching (try "+str(fetch_try+1)+")...",flush=True)
            cookie_str="; ".join(k+"="+v for k,v in cookies.items())
            headers={"User-Agent":ua,"Cookie":cookie_str,"Accept":"text/html,application/xhtml+xml","Accept-Language":"en-US,en;q=0.9"}
            resp=cffi_requests.get(CB_URL,headers=headers,proxies={"https":PROXY,"http":PROXY},impersonate="chrome",timeout=30)
            print("HTTP "+str(resp.status_code),flush=True)
            if resp.status_code==200 and "verify" not in resp.text[:500].lower() and "been blocked" not in resp.text[:500].lower():
                h=resp.text
                def ex(pat,txt=h,g=1):
                    m=re.search(pat,txt,re.DOTALL)
                    return m.group(g).strip() if m else None
                def exall(pat,txt=h):
                    return [m.strip() for m in re.findall(pat,txt,re.DOTALL) if m.strip()]
                # Strip HTML to plain text
                text=re.sub(r'<script[^>]*>.*?</script>','',h,flags=re.DOTALL)
                text=re.sub(r'<style[^>]*>.*?</style>','',text,flags=re.DOTALL)
                text=re.sub(r'<[^>]+>',' ',text)
                text=re.sub(r'&nbsp;',' ',text)
                text=re.sub(r'&amp;','&',text)
                text=re.sub(r'\s+',' ',text).strip()
                # Parse from plain text (FAQ section has clean answers)
                def fx(label):
                    m=re.search(label+r'\s*[:\s]+([^.?!]+)',text)
                    return m.group(1).strip() if m else None
                print("=== "+COMPANY+" ===",flush=True)
                hq=fx(r"headquarters.*located in")
                inv=fx(r"invested.*including")
                comp=fx(r"competitors.*include")
                lastround=fx(r"last funding round on\s+\w+")
                totalfund=fx(r"raised to date.*?raised")
                # Extract from body text
                m=re.search(r'Legal Name\s+(\S[^\n]+?)(?:\s+Operating)',text)
                if m: print("Legal Name: "+m.group(1).strip(),flush=True)
                m=re.search(r'Operating Status\s+(\w+)',text)
                if m: print("Status: "+m.group(1),flush=True)
                m=re.search(r'Company Type\s+([\w\s]+?)(?:\s+Founders)',text)
                if m: print("Type: "+m.group(1).strip(),flush=True)
                m=re.search(r'Founders\s+(\S[^\n]+?)(?:\s+About)',text)
                if m: print("Founders: "+m.group(1).strip(),flush=True)
                m=re.search(r'About the Company\s+(.+?)(?:\s+Phone Number)',text)
                if m: print("Description: "+m.group(1).strip()[:200],flush=True)
                m=re.search(r'Phone Number\s+([\+\d\s\(\)]+)',text)
                if m: print("Phone: "+m.group(1).strip(),flush=True)
                m=re.search(r'Contact Email\s+(\S+@\S+)',text)
                if m: print("Email: "+m.group(1).strip(),flush=True)
                if hq: print("HQ: "+hq,flush=True)
                m=re.search(r'Headcount\s+([\d,\-]+)',text)
                if m: print("Employees: "+m.group(1),flush=True)
                m=re.search(r'Number of Funding Rounds\s+(\d+)',text)
                if m: print("Funding Rounds: "+m.group(1),flush=True)
                if inv: print("Investors: "+inv,flush=True)
                if totalfund: print("Total Funding: "+totalfund,flush=True)
                if lastround: print("Last Round: "+lastround,flush=True)
                if comp: print("Competitors: "+comp,flush=True)
                m=re.search(r'was acquired by\s+(\w[\w\s]+?)(?:\s+on\s)',text)
                if m: print("Acquired by: "+m.group(1).strip(),flush=True)
                # People
                pblock=re.search(r'Employee Profiles\s+(.*?)View All',text)
                if pblock:
                    print("Key People:",flush=True)
                    ptext=re.sub(r'^\s*\d+\s+Contacts\s+\d+\s+Employee Profiles\s*','',pblock.group(1)).strip()
                    titles=r'(?:Chief \w+ Officer|CEO|CTO|CFO|COO|CRO|CMO|CIO|CISO|Operations Director|VP \w+|Director \w+|Head of \w+|President|General Manager|Co-Founder|Founder)'
                    for m in re.finditer(r'(\w[\w ]*?)\s+('+titles+r')',ptext):
                        nm=m.group(1).strip()
                        rl=m.group(2).strip()
                        if len(nm)>2 and not nm[0].isdigit():
                            print("  "+nm+" | "+rl,flush=True)
                # Tech
                m=re.search(r'Monthly Web Visits\s+([\d,]+)',text)
                if m: print("Monthly Visits: "+m.group(1),flush=True)
                m=re.search(r'IT Spend\s+(\$[\d.]+\w)',text)
                if m: print("IT Spend: "+m.group(1),flush=True)
                m=re.search(r'Active Website Tech Count\s+(\d+)',text)
                if m: print("Tech Stack: "+m.group(1)+" technologies",flush=True)
                sys.exit(0)
            # If 403, re-solve with new IP
            print("  Re-solving...",flush=True)
            token=None
            for a2 in range(5):
                sid2="".join(random.choices(string.ascii_lowercase+string.digits,k=8))
                pu2=urlparse(ORIG_PROXY)
                pw2=(pu2.password or "")+"_session-"+sid2+"_lifetime-5m"
                proxy2=pu2.scheme+"://"+pu2.username+":"+pw2+"@"+pu2.hostname+":"+str(pu2.port)
                r2=requests.post("https://api.capsolver.com/createTask",json={"clientKey":CAPSOLVER,"task":{"type":"AntiCloudflareTask","websiteURL":CB_URL,"proxy":proxy2}})
                t2=r2.json()
                if t2.get("errorId",1)!=0: continue
                for _ in range(20):
                    time.sleep(5)
                    r2=requests.post("https://api.capsolver.com/getTaskResult",json={"clientKey":CAPSOLVER,"taskId":t2["taskId"]})
                    res2=r2.json()
                    if res2.get("status")=="ready":
                        sol2=res2["solution"]
                        token=sol2.get("token","")
                        ua=sol2.get("userAgent","")
                        cookies=sol2.get("cookies",{})
                        PROXY=proxy2
                        break
                    elif res2.get("status")!="processing": break
                if token: break
            if not token:
                print("ERROR: re-solve failed",flush=True); sys.exit(1)
        print("ERROR: fetch failed after retries",flush=True); sys.exit(1)
        PYEOF
