settings:
  name: "Google News: Recent mentions in the last 30 days"
  description: "Searches Google News for recent mentions of a company in the last 30 days via RSS. Returns titles, sources, and publication dates. Useful for identifying recent incidents, acquisitions, press coverage, or negative news."
  image: debian
  author:
    - https://github.com/satorici
  example: satori run satori://osint/google-news.yml -d COMPANY="Quorum Cyber" -d DOMAIN="quorumcyber.com" --report --output

google-news:
  install:
    - which curl >/dev/null 2>&1 && which python3 >/dev/null 2>&1 || (export DEBIAN_FRONTEND=noninteractive && apt-get update -qq && apt-get install -qy curl python3 ca-certificates >>/dev/null 2>&1)

  search:
    assertStdout: true
    run:
      - |
        python3 << 'PYEOF'
        import urllib.request, re, sys
        from html import unescape

        company = "${{COMPANY}}"
        domain = "${{DOMAIN}}"
        search = company.replace(" ", "+")

        print(f"=== Google News (last 30 days): {company} ===")

        url = f"https://news.google.com/rss/search?q={search}+OR+{domain}+when:30d&hl=en"
        try:
            req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
            resp = urllib.request.urlopen(req, timeout=15)
            rss = resp.read().decode("utf-8", errors="replace")
        except Exception as e:
            print(f"NO_RESULTS: Could not fetch Google News: {e}")
            sys.exit(0)

        items = re.findall(r"<item>(.*?)</item>", rss, re.DOTALL)

        if not items:
            print("NO_RESULTS: No recent mentions found")
            sys.exit(0)

        for i, item in enumerate(items[:10], 1):
            title = re.search(r"<title>(.*?)</title>", item)
            link = re.search(r"<link/>(.*?)(?:<|$)", item)
            if not link:
                link = re.search(r"<link>(.*?)</link>", item)
            date = re.search(r"<pubDate>(.*?)</pubDate>", item)
            source = re.search(r"<source[^>]*>(.*?)</source>", item)

            title = unescape(title.group(1)) if title else "N/A"
            link = link.group(1).strip() if link else ""
            date = date.group(1).strip() if date else ""
            source = unescape(source.group(1)) if source else ""

            print(f"{i}. {title}")
            if source or date:
                print(f"   Source: {source} | {date}")
            if link:
                print(f"   {link}")

        print(f"\n{len(items)} mention(s) found in Google News (last 30 days)")
        PYEOF
