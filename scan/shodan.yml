settings:
  name: "Shodan: Exposed services and CVE identification"
  description: "Queries Shodan API to identify exposed services, open ports, software versions, and known CVEs on the target's infrastructure. Requires SHODAN_API_KEY."
  image: debian
  author:
    - https://github.com/satorici
  example: satori run satori://scan/shodan.yml -d DOMAIN="scanme.nmap.org" -d SHODAN_API_KEY="your_key" --report --output

shodan:
  install:
    - apt-get update -qq && apt-get install -qy curl jq python3 dnsutils ca-certificates >>/dev/null

  resolve_domain:
    setSeverity: 5
    assertReturnCode: 0
    run:
      - |
        echo "=== Resolving ${{DOMAIN}} via Shodan ==="
        curl -s "https://api.shodan.io/dns/resolve?hostnames=${{DOMAIN}}&key=${{SHODAN_API_KEY}}" | python3 -c "import sys,json; json.dump(json.loads(sys.stdin.buffer.read().decode('utf-8','replace')),sys.stdout)" 2>/dev/null | jq .

  host_info:
    setSeverity: 2
    assertStdoutNotContains: "VULN_FOUND"
    run:
      - |
        CLEAN() { python3 -c "import sys,json; json.dump(json.loads(sys.stdin.buffer.read().decode('utf-8','replace')),sys.stdout)" 2>/dev/null; }
        IP=$(curl -s "https://api.shodan.io/dns/resolve?hostnames=${{DOMAIN}}&key=${{SHODAN_API_KEY}}" | CLEAN | jq -r '."${{DOMAIN}}"')
        echo "=== Shodan Host Info for $IP ==="
        curl -s "https://api.shodan.io/shodan/host/${IP}?key=${{SHODAN_API_KEY}}" | CLEAN > /tmp/shodan.json
        jq '{ip: .ip_str, os: .os, ports: .ports, hostnames: .hostnames, vulns: .vulns, last_update: .last_update}' /tmp/shodan.json 2>/dev/null
        echo "=== Open Ports and Services ==="
        jq -r '.data[] | "\(.port)/\(.transport) - \(.product // "unknown") \(.version // "") - Last seen: \(.timestamp)"' /tmp/shodan.json 2>/dev/null
        echo "=== Known CVEs ==="
        VULNS=$(jq -r '.vulns // {} | keys[]' /tmp/shodan.json 2>/dev/null)
        if [ -n "$VULNS" ]; then
          echo "$VULNS"
          echo "VULN_FOUND: $(echo "$VULNS" | wc -l | tr -d ' ') CVE(s) detected on ${{DOMAIN}}"
        else
          echo "No CVEs found"
        fi
