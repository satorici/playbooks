settings:
  name: "Shodan: Exposed services and CVE identification"
  description: "Queries Shodan API to identify exposed services, open ports, software versions, and known CVEs on the target's infrastructure and subdomains. Requires SHODAN_API_KEY."
  image: debian
  author:
    - https://github.com/satorici
  example: satori run satori://scan/shodan.yml -d DOMAIN="scanme.nmap.org" -d SHODAN_API_KEY="your_key" --report --output
  redacted:
    - SHODAN_API_KEY

shodan:
  install:
    - command -v dig >/dev/null 2>&1 && command -v jq >/dev/null 2>&1 || (export DEBIAN_FRONTEND=noninteractive && apt-get update -qq && apt-get install -qy curl jq python3 dnsutils ca-certificates >>/dev/null)

  scan:
    setSeverity: 2
    assertStdoutNotContains: "VULN_FOUND"
    run:
      - |
        CLEAN() { python3 -c "import sys,json; json.dump(json.loads(sys.stdin.buffer.read().decode('utf-8','replace')),sys.stdout)" 2>/dev/null; }
        SCAN_IP() {
          local HOST="$1" IP="$2"
          curl -s "https://api.shodan.io/shodan/host/${IP}?key=${{SHODAN_API_KEY}}" | CLEAN > /tmp/shodan_${IP}.json
          PORTS=$(jq -r '.ports // [] | join(", ")' /tmp/shodan_${IP}.json 2>/dev/null)
          VULNS=$(jq -r '.vulns // [] | length' /tmp/shodan_${IP}.json 2>/dev/null)
          if [ -n "$PORTS" ] && [ "$PORTS" != "null" ]; then
            echo "$HOST ($IP): ports=$PORTS vulns=$VULNS"
            jq -r '.data[]? | "  \(.port)/\(.transport) - \(.product // "unknown") \(.version // "") - \(.timestamp)"' /tmp/shodan_${IP}.json 2>/dev/null
            if [ "$VULNS" -gt 0 ] 2>/dev/null; then
              jq -r '.vulns[]' /tmp/shodan_${IP}.json 2>/dev/null | while read CVE; do echo "  CVE: $CVE"; done
              echo "VULN_FOUND: ${VULNS} CVE(s) on $HOST ($IP)"
            fi
          fi
        }

        echo "=== Shodan Scan: ${{DOMAIN}} ==="

        # Scan main domain
        MAIN_IP=$(dig +short A ${{DOMAIN}} | head -1)
        echo "Main domain: ${{DOMAIN}} -> $MAIN_IP"
        SCAN_IP "${{DOMAIN}}" "$MAIN_IP"

        # Discover subdomains with direct IPs (not CDN)
        echo "=== Scanning subdomains with direct IPs ==="
        SUBS=$(curl -s "https://crt.sh/?q=%25.${{DOMAIN}}&output=json" | jq -r '.[].name_value' 2>/dev/null | sort -u | grep -v '^\*' | head -30)
        SEEN=""
        for SUB in $SUBS; do
          IP=$(dig +short A "$SUB" 2>/dev/null | head -1)
          [ -z "$IP" ] && continue
          echo "$SEEN" | grep -q "$IP" && continue
          SEEN="$SEEN $IP"
          # Skip CDN IPs (Cloudflare, Akamai, Azure Front Door)
          echo "$IP" | grep -qE '^104\.2[0-9]\.|^172\.6[4-9]\.|^172\.7[0-1]\.|^2606:4700' && continue
          SCAN_IP "$SUB" "$IP"
          sleep 1
        done

        echo "=== Scan complete ==="
