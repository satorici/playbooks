settings:
  name: "Smap: port scanner built with shodan.io's free API"
  description: "smap is a network scanner that functions as a faster, more efficient alternative to Nmap by leveraging masscan for high-speed host discovery and integrating Nmap’s service and vulnerability detection capabilities. It supports asynchronous scanning and provides detailed network insights."
  image: debian
  author:
    - https://github.com/s0md3v
  gallery:
    - https://files.catbox.moe/ml1506.png
  example: satori run satori://scan/smap.yml -d HOST="satori.ci" --report --output

smap:
  install:
    - command -v smap >/dev/null 2>&1 || (export DEBIAN_FRONTEND=noninteractive && apt-get update -qq && apt-get install -qy curl ca-certificates xz-utils >>/dev/null && curl -sL https://api.github.com/repos/s0md3v/smap/releases/latest | grep browser_download_url | grep 'linux_amd64\.tar\.xz"' | head -1 | cut -d'"' -f4 | xargs curl -sL -o /tmp/smap.tar.xz && tar xJf /tmp/smap.tar.xz -C /tmp/ && find /tmp -name smap -type f -exec mv {} /usr/local/bin/ \; && chmod +x /usr/local/bin/smap)


  test:
    assertReturnCode: 0
    run:
      - smap ${{HOST}}
