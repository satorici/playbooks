settings:
  name: "TestSSL: Checks TLS/SSL ciphers and protocols for security flaws"
  description: "Check a server's service on any port for the support of TLS/SSL ciphers, protocols as well as some cryptographic flaws."
  image: debian
  author:
    - https://github.com/testssl
  gallery:
    - https://files.catbox.moe/5n2n6f.gif
  example: satori run satori://web/tls/testssl.yml -d URL="https://satori.ci" --report --output

testssl:
  install:
    - command -v testssl >/dev/null 2>&1 || (export DEBIAN_FRONTEND=noninteractive && apt-get update >>/dev/null; apt-get install -qy testssl.sh >>/dev/null)


  test:
    run:
      - testssl -p -s -f -U -S -P --csvfile=log ${{URL}}
    findings:
      assertReturnCode: 0
      assertStdoutNotContains:
        - LOW
        - MEDIUM
        - HIGH
        - CRITICAL
        - FATAL
      check:
        - awk -F'","' '$4=="LOW"||$4=="MEDIUM"||$4=="HIGH"||$4=="CRITICAL"||$4=="FATAL"{print}' log; echo "TESTSSL_DONE"
    log:
      check:
        - grep -v "CERTIFICATE\|cert_fingerprintSHA" log | grep -v "^\"cert <\|^\"intermediate_cert <" | sort -t',' -k1,1 -u
