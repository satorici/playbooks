settings:
  name: "RAPTOR Web - LLM Web App Pentesting (local model)"
  description: "Runs RAPTOR (gadievron/raptor) web scanner against a LIVE web application for OWASP Top 10 issues, powered by a LOCAL model. NOTE: RAPTOR web is ALPHA (false positives, no authenticated scanning) - only test targets you own or are authorised to test. Choose the model with -d MODEL."
  timeout: 5400
  files: false   # do not upload artifacts; findings print to stdout (scan files land under /tmp/raptor/out)
  example: satori local satori://web/llm/raptor-local.yml -d HOST="http://zero.webappsecurity.com" -d MODEL="qwen3.6-35b" --output

raptor:
  install:
    # Clone RAPTOR into /tmp (just source; no Python deps installed). Nothing of RAPTOR in $HOME.
    - test -d /tmp/raptor/.claude || git clone --depth 1 https://github.com/gadievron/raptor.git /tmp/raptor
    # uv is a single self-contained binary (fine to keep in ~/.local/bin); used to run RAPTOR in a throwaway env.
    - command -v uv >/dev/null 2>&1 || curl -LsSf https://astral.sh/uv/install.sh | sh

  run:
    - |
      # --- LOCAL MODEL: point the RAPTOR LLM dispatcher at the pgx vLLM (Anthropic /v1/messages) ---
      export ANTHROPIC_BASE_URL="http://localhost:8000"
      export ANTHROPIC_AUTH_TOKEN=""
      export ANTHROPIC_API_KEY="local"
      export ANTHROPIC_MODEL="${{MODEL}}"
      export ANTHROPIC_SMALL_FAST_MODEL="${{MODEL}}"
      export CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
      export CLAUDE_CODE_DISABLE_1M_CONTEXT=1
      export CLAUDE_AUTOCOMPACT_PCT_OVERRIDE=75
      export DISABLE_TELEMETRY=1 DISABLE_AUTOUPDATER=1 DISABLE_ERROR_REPORTING=1
      export API_TIMEOUT_MS=1800000
      export IS_SANDBOX=1
      # uv lives in ~/.local/bin.
      export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"

      TARGET="${{HOST}}"
      # Preflight: the local model must be reachable before we start.
      curl -sf -m 10 -o /dev/null "$ANTHROPIC_BASE_URL/v1/models" || { echo "[fatal] local model not reachable at $ANTHROPIC_BASE_URL (is vLLM up on pgx?)"; exit 1; }
      echo "raptor=$(cd /tmp/raptor && git rev-parse --short HEAD 2>/dev/null)  MODEL=$ANTHROPIC_MODEL  TARGET=$TARGET"
      # Ephemeral execution via uv (nothing installed into the host Python). Run the web scanner directly.
      cd /tmp/raptor
      timeout --signal=INT 5100 \
        uv run --no-project --python 3.12 --with-requirements /tmp/raptor/requirements.txt \
        python raptor.py web --url "$TARGET" \
        > /tmp/raptor-web.log 2>&1
      RC=$?
      [ "$RC" = "124" ] && echo "WARN: RAPTOR hit the run cap (killed by timeout)"
      echo "==================== RAPTOR WEB LOG ===================="
      cat /tmp/raptor-web.log
      echo "==================== FINDINGS (SARIF / results) ===================="
      FOUND=0
      for s in $(find /tmp/raptor/out -name '*.sarif' -o -name 'vulnerabilities.json' 2>/dev/null); do
        FOUND=1; echo "--- $s ---"
        jq -r '(.runs[].results[]? | "[\(.level // "note")] \(.ruleId): \(.message.text)") // (.[]? | "[\(.severity // "?")] \(.title // .name)")' "$s" 2>/dev/null || cat "$s"
      done
      [ "$FOUND" = "0" ] && echo "no findings file written (0 findings or scanner skipped)"
      echo "==================== WEB SCAN ARTIFACTS (en /tmp/raptor/out) ===================="
      find /tmp/raptor/out -type f 2>/dev/null | sort | head -50
      echo "[gate] raptor exit code: $RC"
      exit $RC
  ran:
    setOutput: raptor.run
    assertReturnCode: 0
