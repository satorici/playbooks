settings:
  name: "Xalgorix - LLM Pentesting"
  description: "Run xalgorix autonomous pentesting agent against a target"
  image: golang
  files: true
  timeout: 3600
  example: satori run satori://web/llm/xalgorix.yml -d HOST="http://zero.webappsecurity.com" -d MODEL="openrouter/anthropic/claude-sonnet-4.5" -d OPENROUTER="$OPENROUTER" --output
  cpu: 4096
  memory: 8192
  redacted:
    - OPENROUTER

xalgorix:
  install:
    - export DEBIAN_FRONTEND=noninteractive; apt-get update >/dev/null 2>/dev/null; apt-get install -qy python3 python3-pip python3-venv chromium >/dev/null 2>/dev/null
    - pip3 install requests beautifulsoup4 -U -q --break-system-packages --disable-pip-version-check --root-user-action=ignore
    - go install -v github.com/xalgord/xalgorix/v4/cmd/xalgorix@latest 2>/dev/null

  run:
    - export XALGORIX_LLM=${{MODEL}} XALGORIX_API_KEY=${{OPENROUTER}} XALGORIX_API_BASE=https://openrouter.ai/api/v1 XALGORIX_DATA_DIR=/data && xalgorix --target ${{HOST}}
