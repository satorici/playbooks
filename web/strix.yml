settings:
  name: "Strix: AI pentesting"
  description: "Runs Strix (usestrix/strix), the AI-powered automated pentesting agent, entirely inside the Satori container via a custom unix_local runtime backend (from satoridev01/strix). Runs on Strix's OFFICIAL Kali sandbox image so the full toolset (agent-browser+chromium, nuclei, httpx, nmap, semgrep, ...) is present. Driven by Gemini 2.5 Flash via OpenRouter (1M-token context to avoid mid-scan context-overflow crashes). No Docker-in-Docker required."
  image: ghcr.io/usestrix/strix-sandbox:1.0.0
  timeout: 5400
  cpu: 4096
  memory: 8192
  files: true
  example: satori run satori://web/strix.yml -d HOST="http://zero.webappsecurity.com" -d MODE="quick" -d OPENROUTER=$OPENROUTER --output --test strix:run:stdout
  gallery:
    - https://files.catbox.moe/byf8jh.png
  redacted:
    - OPENROUTER

strix:
  install:
    # The image already ships the full pentest toolchain but NOT the strix CLI itself. Install it pinned so the shim's monkeypatches stay valid.
    - pip install --break-system-packages --root-user-action=ignore -q "strix-agent==1.0.2"
    # The local-backend fix — tracks main (repo is in active development; we control it).
    - curl -sL https://raw.githubusercontent.com/satoridev01/strix/main/strix_local_backend.py -o /tmp/strix_local_backend.py

  run:
    - |
      export STRIX_LLM="openrouter/google/gemini-2.5-flash"
      export LLM_API_KEY="${{OPENROUTER}}"
      export STRIX_TELEMETRY=0
      export STRIX_TARGET="${{HOST}}"
      export STRIX_SCAN_MODE="${{MODE}}"
      # No TTY in the container -> rich/click default to 80 cols. Widen Strix's panel output.
      export COLUMNS=200
      # Make the image npm-global tools (agent-browser) reachable
      export PATH="/home/pentester/.npm-global/bin:/home/pentester/go/bin:/home/pentester/.local/bin:$PATH"
      # Run from the runner CWD (captured dir) so artifacts are retrievable with --files.
      echo "PWD=$(pwd) HOME=$HOME"
      # CRITICAL: on exit, Strix tears down by sending SIGTERM to its OWN process
      # group. The Satori runner launches this script as a process-group leader,
      # so without isolation that teardown SIGTERM also kills THIS shell — the
      # command returns -15 and the run is truncated before any report is emitted
      # (no vulnerabilities, no exit-code gate). Running strix under `setsid` puts
      # it in a brand-new session, so its teardown signal stays contained and we
      # always reach the report dump + gate below. `-w` makes setsid wait and
      # propagate strix's real exit code (0=clean, 2=vulns, 1=crash).
      setsid -w python3 /tmp/strix_local_backend.py > /tmp/strix_out.txt 2>&1 &
      SPID=$!
      wait "$SPID"; RC=$?
      grep -v 'Provider List: https' /tmp/strix_out.txt
      echo; echo "==================== ALL VULNERABILITIES (vulnerabilities.json) ===================="
      VJSON=$(find . -name vulnerabilities.json 2>/dev/null | head -1)
      if [ -n "$VJSON" ]; then
        echo "count: $(jq 'length' "$VJSON")"
        jq -r '.[] | "\n### [sev \(.severity // "?")] \(.title // .name // "untitled")  (\(.cvss_score // "?"))\n\(.description // "")"' "$VJSON" 2>/dev/null || cat "$VJSON"
      else
        echo "no vulnerabilities.json written (0 findings filed)"
      fi
      echo "[gate] strix exit code: $RC (0=clean, 2=vulns found, 1=crash, negative=killed by signal)"
      # The scan SUCCEEDED whether it found vulns (2) or not (0) — findings are
      # reported above and on the report page. Only a crash (1) or a kill signal
      # (negative) is a real failure. For a strict fail-on-findings security gate
      # (e.g. scanning your own app in CI), replace the line below with `exit $RC`.
      if [ "$RC" = "0" ] || [ "$RC" = "2" ]; then exit 0; else exit "${RC#-}"; fi
  # Strix headless exit codes: 0 = no vulns, 2 = vulns found, 1 = wrapper/crash.
  ran:
    setOutput: strix.run
    assertReturnCode: 0
