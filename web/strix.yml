settings:
  name: "Strix - LLM Pentesting"
  description: "Runs Strix (usestrix/strix), the AI-powered automated pentesting agent, entirely inside the Satori container via a custom unix_local runtime backend (from satoridev01/strix). Runs on Strix's OFFICIAL Kali sandbox image so the full toolset (agent-browser+chromium, nuclei, httpx, nmap, semgrep, ...) is present. Driven by Claude Sonnet 4.5 via OpenRouter (1M-token context to avoid mid-scan context-overflow crashes, with Anthropic prompt caching for cost). No Docker-in-Docker required."
  image: ghcr.io/usestrix/strix-sandbox:1.0.0
  timeout: 5400
  cpu: 4096
  memory: 8192
  files: true
  example: satori run satori://web/strix.yml -d HOST="http://zero.webappsecurity.com" -d MODE="quick" -d OPENROUTER=$OPENROUTER --output --test strix:run:stdout
  gallery:
    - https://files.catbox.moe/byf8jh.png
  redacted:
    - OPENROUTER

strix:
  install:
    # The image already ships the full pentest toolchain but NOT the strix CLI itself. Install it pinned so the shim's monkeypatches stay valid.
    - pip install "strix-agent==1.0.2" -U -q --break-system-packages --root-user-action=ignore
    # `-U` above pulls openai>=2.46, which breaks openai-agents (1.0.2/0.14.6) two
    # ways: (1) InputTokensDetails now *requires* cache_write_tokens (agents only
    # passes cached_tokens) -> pydantic ValidationError kills LLM warm-up. Pin
    # openai into the compatible window: new enough to expose ResponseToolSearchCall
    # (needed by agents.items, absent <=2.22), old enough that cache_write_tokens
    # is still optional (becomes required at 2.45). 2.40.0 is the newest that fits.
    - pip install "openai==2.40.0" -q --break-system-packages --root-user-action=ignore
    # The local-backend fix — tracks main (repo is in active development; we control it).
    - curl -sL https://raw.githubusercontent.com/satoridev01/strix/main/strix_local_backend.py -o /tmp/strix_local_backend.py

  run:
    - |
      # ---- LLM preflight -------------------------------------------------
      # A dead/rate-limited/uncredited model makes Strix crash MID-scan after
      # burning the whole timeout. Ping the model cheaply up front (a real
      # max_tokens:1 completion, since an .error can come back even on HTTP
      # 200) and fall back to an OpenAI model if the primary Claude one is
      # unreachable. STRIX_LLM is then set from whatever actually answered.
      PRIMARY="anthropic/claude-sonnet-4.6"   # 1M-context + Anthropic prompt caching (Claude-specific)
      BACKUP="openai/gpt-4.1"                 # fallback: closest OpenAI tier to Sonnet 4.6 in cost + capability (strong tool-use, long context); no Anthropic 1M/caching tuning
      API="https://openrouter.ai/api/v1/chat/completions"
      ping_model() {
        MODEL="$1"; echo "[preflight] pinging $MODEL ..."
        BODY=$(curl -sS -w '\n%{http_code}' "$API" \
          -H "Authorization: Bearer ${{OPENROUTER}}" \
          -H "Content-Type: application/json" \
          -d "{\"model\":\"$MODEL\",\"max_tokens\":1,\"messages\":[{\"role\":\"user\",\"content\":\"ping\"}]}")
        HTTP=$(printf '%s' "$BODY" | tail -n1)
        JSON=$(printf '%s' "$BODY" | sed '$d')
        ERR=$(printf '%s' "$JSON" | jq -r '.error.message // empty' 2>/dev/null)
        if [ "$HTTP" = "200" ] && [ -z "$ERR" ]; then echo "[preflight] $MODEL OK"; return 0; fi
        echo "[preflight] $MODEL FAIL (http $HTTP): ${ERR:-non-200 response}"; return 1
      }
      if ping_model "$PRIMARY"; then SELECTED="openrouter/$PRIMARY"
      elif echo "[preflight] primary unavailable, trying OpenAI backup..." && ping_model "$BACKUP"; then SELECTED="openrouter/$BACKUP"
      else echo "[preflight] no LLM available — aborting before scan"; exit 1; fi
      echo "[preflight] using model: $SELECTED"
      # --------------------------------------------------------------------
      export STRIX_LLM="$SELECTED"
      export LLM_API_KEY="${{OPENROUTER}}"
      # litellm's openrouter/ provider authenticates from OPENROUTER_API_KEY.
      # With only LLM_API_KEY the bearer sometimes isn't sent -> OpenRouter falls
      # back to cookie auth and 401s ("No cookie auth credentials found"). Set both.
      export OPENROUTER_API_KEY="${{OPENROUTER}}"
      export STRIX_TELEMETRY=0
      export STRIX_TARGET="${{HOST}}"
      export STRIX_SCAN_MODE="${{MODE}}"
      # No TTY in the container -> rich/click default to 80 cols. Widen Strix's panel output.
      export COLUMNS=200
      # Make the image npm-global tools (agent-browser) reachable
      export PATH="/home/pentester/.npm-global/bin:/home/pentester/go/bin:/home/pentester/.local/bin:$PATH"
      # Run from the runner CWD (captured dir) so artifacts are retrievable with --files.
      echo "PWD=$(pwd) HOME=$HOME"
      # CRITICAL: on exit, Strix tears down by sending SIGTERM to its OWN process
      # group. The Satori runner launches this script as a process-group leader,
      # so without isolation that teardown SIGTERM also kills THIS shell — the
      # command returns -15 and the run is truncated before any report is emitted
      # (no vulnerabilities, no exit-code gate). Running strix under `setsid` puts
      # it in a brand-new session, so its teardown signal stays contained and we
      # always reach the report dump + gate below. `-w` makes setsid wait and
      # propagate strix's real exit code (0=clean, 2=vulns, 1=crash).
      setsid -w python3 /tmp/strix_local_backend.py > /tmp/strix_out.txt 2>&1 &
      SPID=$!
      wait "$SPID"; RC=$?
      grep -v 'Provider List: https' /tmp/strix_out.txt
      echo; echo "==================== ALL VULNERABILITIES (vulnerabilities.json) ===================="
      VJSON=$(find . -name vulnerabilities.json 2>/dev/null | head -1)
      if [ -n "$VJSON" ]; then
        echo "count: $(jq 'length' "$VJSON")"
        jq -r '.[] | "\n### [sev \(.severity // "?")] \(.title // .name // "untitled")  (\(.cvss_score // "?"))\n\(.description // "")"' "$VJSON" 2>/dev/null || cat "$VJSON"
      else
        echo "no vulnerabilities.json written (0 findings filed)"
      fi
      echo "[gate] strix exit code: $RC (0=clean, 2=vulns found, 1=crash, negative=killed by signal)"
      # The scan SUCCEEDED whether it found vulns (2) or not (0) — findings are
      # reported above and on the report page. Only a crash (1) or a kill signal
      # (negative) is a real failure. For a strict fail-on-findings security gate
      # (e.g. scanning your own app in CI), replace the line below with `exit $RC`.
      if [ "$RC" = "0" ] || [ "$RC" = "2" ]; then exit 0; else exit "${RC#-}"; fi
  # Strix headless exit codes: 0 = no vulns, 2 = vulns found, 1 = wrapper/crash.
  ran:
    setOutput: strix.run
    assertReturnCode: 0
