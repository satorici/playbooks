settings:
  name: "Xalgorix - LLM Pentesting"
  description: "Run xalgorix autonomous pentesting agent against a target"
  image: golang
  files: true
  timeout: 3600
  example: satori run satori://web/xalgorix.yml -d HOST="http://zero.webappsecurity.com" -d MODEL="openrouter/anthropic/claude-sonnet-4.5" -d OPENROUTER="$OPENROUTER" --output
  cpu: 4096
  memory: 8192
  redacted:
    - OPENROUTER

xalgorix:
  install:
    - apt-get update >/dev/null 2>/dev/null; apt-get install -qy python3 python3-pip libnss3 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2 libpango-1.0-0 libcairo2 >/dev/null 2>/dev/null
    - pip3 install --break-system-packages requests beautifulsoup4 -q --disable-pip-version-check --root-user-action=ignore
    - go install -v github.com/xalgord/xalgorix/v4/cmd/xalgorix@latest 2>/dev/null

  run:
    - export XALGORIX_LLM=${{MODEL}} XALGORIX_API_KEY=${{OPENROUTER}} XALGORIX_API_BASE=https://openrouter.ai/api/v1 XALGORIX_DATA_DIR=/data && xalgorix --target ${{HOST}}
