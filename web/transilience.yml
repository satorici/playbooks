settings:
  name: "Transilience - LLM Pentesting"
  description: "Runs an autonomous web-app penetration test by driving the Claude Code CLI headlessly inside the container with the transilienceai/communitytools security skills (/pentest: recon -> injection/XSS/SSRF/auth -> validation -> CVSS report). Claude Code talks to OpenRouter via its native Anthropic Skin (ANTHROPIC_BASE_URL=https://openrouter.ai/api), so no proxy is needed. Pick the model with -d MODEL (e.g. anthropic/claude-haiku-4.5 cheap, or anthropic/claude-sonnet-4.6 for higher coverage)."
  image: kalilinux/kali-rolling
  author:
    - https://github.com/satoridev01
  gallery:
    - https://files.catbox.moe/byf8jh.png
  example: satori run satori://web/transilience.yml -d HOST="http://zero.webappsecurity.com" -d MODEL="anthropic/claude-sonnet-4.6" -d OPENROUTER=$OPENROUTER --output
  timeout: 4800
  cpu: 4096
  memory: 8192
  files: true
  redacted:
    - OPENROUTER

transilience:
  install:
    - apt-get update -qy >/dev/null 2>&1
    - DEBIAN_FRONTEND=noninteractive apt-get install -qy --no-install-recommends git curl ca-certificates jq nodejs npm python3 python3-pip chromium nmap sqlmap >/dev/null 2>&1
    # Claude Code CLI + Playwright MCP for browser-driven web testing
    - npm install -g @anthropic-ai/claude-code @playwright/mcp >/dev/null 2>&1
    # The transilienceai security skills (MIT). The 'projects/pentest' dir ships the .claude/ skill symlinks.
    - git clone --depth 1 https://github.com/transilienceai/communitytools.git /opt/communitytools >/dev/null 2>&1

  run:
    - |
      # Fail fast with a clear message if the OpenRouter key was not supplied.
      if [ -z "${{OPENROUTER}}" ]; then
        echo "ERROR: OPENROUTER is empty. Run with: -d OPENROUTER=\$OPENROUTER"; exit 1
      fi
      # --- OpenRouter via the Claude Code ---
      export ANTHROPIC_BASE_URL="https://openrouter.ai/api"
      export ANTHROPIC_AUTH_TOKEN="${{OPENROUTER}}"
      export ANTHROPIC_MODEL="${{MODEL}}"
      export ANTHROPIC_SMALL_FAST_MODEL="${{MODEL}}"
      export DISABLE_TELEMETRY=1 DISABLE_AUTOUPDATER=1 DISABLE_ERROR_REPORTING=1
      # Satori containers run as root; Claude Code refuses --dangerously-skip-permissions
      # as root unless it detects a sandbox. We are already inside an ephemeral container.
      export IS_SANDBOX=1
      export CHROME_BIN=/usr/bin/chromium PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=/usr/bin/chromium
      # Run from the repo root: its .claude/skills symlink exposes ALL the security skills.
      # These are Claude Code *skills* (model-invoked), not slash commands, so we drive
      # them with a natural-language prompt and name the skills to force their use.
      cd /opt/communitytools
      echo "PWD=$(pwd)  claude=$(claude --version 2>/dev/null)"
      # Headless, autonomous. JSON output so we always capture the result + diagnostics
      # even when the final assistant message is empty.
      timeout --signal=INT 3600 \
        claude -p "Use your pentest-engagement, reconnaissance, injection, client-side, server-side and authentication skills to perform a full web application penetration test against ${{HOST}}. Enumerate the attack surface, test for the OWASP Top 10, validate each finding, then write your findings to /data/findings.md (and any supporting report files under /data/) and print the full report as your final message with CVSS scores." \
        --dangerously-skip-permissions \
        --max-turns 60 \
        --output-format json > /tmp/pentest.json 2>/tmp/pentest.err
      RC=$?
      [ "$RC" = "124" ] && echo "WARN: claude hit the 60-min agent cap (killed by timeout)"
      # Persist artifacts to the captured rundir (/data) for --files. The agent on-disk
      # output location is non-deterministic, so we ALWAYS save the report ourselves from
      # the JSON result, then also copy any files the agent did write.
      jq -r '.result // empty' /tmp/pentest.json > /data/pentest-report.md 2>/dev/null
      cp /tmp/pentest.json /data/pentest-result.json 2>/dev/null
      cp -a /opt/communitytools/OUTPUT_DIR /data/ 2>/dev/null
      cp /opt/communitytools/findings.md /data/ 2>/dev/null
      echo "==================== CLAUDE RESULT ===================="
      # Prefer the final assistant message; if empty, fall back to the agent written report.
      RES=$(jq -r '.result // empty' /tmp/pentest.json 2>/dev/null)
      if [ -n "$RES" ]; then echo "$RES"
      elif [ -f /data/findings.md ]; then echo "(empty final message - showing /data/findings.md)"; cat /data/findings.md
      else cat /tmp/pentest.json; fi
      echo "==================== RUN STATS ===================="
      jq -r '"success=\(.subtype)  is_error=\(.is_error)  turns=\(.num_turns)  cost_usd=\(.total_cost_usd)"' /tmp/pentest.json 2>/dev/null
      echo "==================== STDERR (tail) ===================="
      tail -20 /tmp/pentest.err
      echo "==================== ARTIFACTS IN /data (retrievable with --files) ===================="
      # pentest-report.md (always) + pentest-result.json + anything the agent wrote.
      find /data -type f 2>/dev/null | sort
      echo "[gate] claude exit code: $RC"
      exit $RC
  ran:
    setOutput: pentest.run
    assertReturnCode: 0
