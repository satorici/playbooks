settings:
  name: "FFuf: Web fuzzer to discover hidden files and directories"
  description: "Fast web fuzzer for discovering hidden endpoints and parameters"
  image: debian
  author:
    - https://github.com/ffuf
  gallery:
    - https://files.catbox.moe/4wqoh8.png
  example: satori run satori://web/enum/ffuf.yml -d URL="https://example.com" --report --output

ffuf:
  install:
    - apt-get update -qq && apt-get install -qy curl ca-certificates >>/dev/null
    - curl -sL https://api.github.com/repos/ffuf/ffuf/releases/latest | grep browser_download_url | grep 'linux_amd64\.tar\.gz"' | head -1 | cut -d'"' -f4 | xargs curl -sL | tar xz -C /usr/local/bin/
    - mkdir -p /wordlists
    - curl -s https://raw.githubusercontent.com/danielmiessler/SecLists/master/Discovery/Web-Content/common.txt -o /wordlists/common.txt

  help:
    - ffuf -h

  test:
    assertReturnCode: 0
    run:
      - ffuf -w /wordlists/common.txt -u ${{URL}}/FUZZ -mc 200,201,202,203,204,301,302,307,401,403
