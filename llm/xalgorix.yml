settings:
  name: "Xalgorix - LLM Pentesting"
  description: "Run xalgorix autonomous pentesting agent against a target"
  image: golang
  files: true
  timeout: 3600

xalgorix:
  install:
    - go install -v github.com/xalgord/xalgorix/v3/cmd/xalgorix@latest 2>/dev/null

  run:
    - export XALGORIX_LLM=${{MODEL}} XALGORIX_API_KEY=${{API_KEY}} XALGORIX_API_BASE=https://openrouter.ai/api/v1 && xalgorix --target ${{TARGET}}

