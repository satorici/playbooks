settings:
  name: Gemini CLI
  description: "Uses Google Gemini CLI to query a cloned repository with an AI prompt."
  image: node
  timeout: 900
  author:
    - https://github.com/google-gemini
  example: satori run satori://llm/gemini.yml -d REPO="owner/repo" -d PROMPT="Analyze this code" -d GEMINI_API_KEY=$GEMINI_API_KEY --report --output
  redacted:
    - GEMINI_API_KEY

install:
  - apt-get update >>/dev/null; apt-get install -qy git >>/dev/null
  - git clone --depth 1 https://github.com/${{REPO}}.git .

gemini:
  - rm -fr ".git*"; export GEMINI_API_KEY=${{GEMINI_API_KEY}}; npx https://github.com/google-gemini/gemini-cli -a -y -p "${{PROMPT}}"
