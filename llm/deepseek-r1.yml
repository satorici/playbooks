settings:
  name: "deepseek-r1 LLM"
  description: "Queries deepseek-r1 with the provided input. Ensures the Ollama server runs correctly, pulls the specified model, and executes the query."
  image: ollama/ollama
  cpu: 16384
  memory: 122880
  storage: 100
  timeout: 400
  author:
    - https://github.com/ollama
  gallery:
    - https://files.catbox.moe/5wp866.png
  example: satori run satori://llm/deepseek-r1.yml -d INPUT="Hello World" --report --output

MODEL:
  - - "deepseek-r1"

deepseek-r1:
  install:
    - apt-get update >> /dev/null; apt-get install -qy screen >> /dev/null

  test:
    assertReturnCode: 0
    serve:
      - ps aux | grep -v grep | grep -q ollama || screen -dm ollama serve
      - sleep 1

    pull:
      - ollama pull ${{MODEL}}

    query:
      - ollama run ${{MODEL}} "${{INPUT}}"
