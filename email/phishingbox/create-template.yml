settings:
  name: "PhishingBox: create phishing email template (from our AI lure)"
  description: "Creates a phishing email template in PhishingBox (api/v2/template/create) using the lure produced by template-ai (read from /tmp/satori/out/tpl_* artifacts: subject, HTML body, from name/email). TPL_DOMAIN is the hook-link CNAME (an authorized/verified domain on the account). If TPL_LANDING_ID is provided (a landing page UUID, e.g. from the library), the template is set to type=landing so a click leads to a credential-capture page; otherwise type=none (click only tracked). Prints TEMPLATE_UUID for chaining into launch-campaign."
  image: debian:stable-slim
  author:
    - https://github.com/satorici
  example: satori run satori://email/phishingbox/create-template.yml -d PHISHINGBOX="$PHISHINGBOX" -d TPL_DOMAIN="satori-ci.com" -d TPL_NAME="IT Security Notice" -d TPL_LANDING_ID="" --report --output
  redacted:
    - PHISHINGBOX

TYPE:
  - - "none"

phishingbox:
  install:
    - export DEBIAN_FRONTEND=noninteractive; apt-get update -qq && apt-get install -qy --no-install-recommends curl jq ca-certificates >/dev/null 2>&1

  create_template:
    assertStdoutContains: "TEMPLATE_UUID="
    assertStdoutNotContains: "Invalid API user token"
    run:
      - |
        TOKEN="${{PHISHINGBOX}}"
        DOMAIN="${{TPL_DOMAIN}}"
        LANDING_ID="${{TPL_LANDING_ID}}"
        NAME="${{TPL_NAME}}"
        HOST="portal.pbx-sec.com"; CATS="18"; LOCALE="en"
        BASE="https://$HOST/api/v2"; AUTH="api-token: $TOKEN"; CT="content-type: application/json"

        # lure from template-ai artifacts
        SUBJECT="$(cat /tmp/satori/out/tpl_subject 2>/dev/null)"
        BODY="$(cat /tmp/satori/out/tpl_body 2>/dev/null)"
        FROM_EMAIL="$(cat /tmp/satori/out/tpl_from_email 2>/dev/null)"
        FROM_NAME="$(cat /tmp/satori/out/tpl_from_name 2>/dev/null)"
        if [ -z "$BODY" ] || [ -z "$SUBJECT" ]; then echo "No lure found - run template-ai first (expects /tmp/satori/out/tpl_subject and tpl_body)"; exit 1; fi
        # WAF safety net: the create API blocks inline style= and full-document HTML - strip them
        BODY="$(printf '%s' "$BODY" | sed -e 's/ style="[^"]*"//g' -e 's/<!DOCTYPE[^>]*>//Ig' -e 's#</\{0,1\}html[^>]*>##Ig' -e 's#</\{0,1\}body[^>]*>##Ig' -e 's#</\{0,1\}head[^>]*>##Ig' -e 's#<meta[^>]*>##Ig' -e 's#<title[^>]*>[^<]*</title>##Ig')"
        [ -z "$NAME" ] && NAME="$(cat /tmp/satori/out/tpl_lure 2>/dev/null)"; [ -z "$NAME" ] && NAME="Security notice for $DOMAIN"
        [ -z "$FROM_EMAIL" ] && FROM_EMAIL="it-security@$DOMAIN"
        REPLYTO="$FROM_EMAIL"

        # measurement level: TYPE=none -> clicks only; TYPE=landing (+TPL_LANDING_ID) -> landing/credential capture
        TYPE="${{TYPE}}"; [ -z "$TYPE" ] && TYPE="none"
        CATS_JSON="$(printf '%s' "$CATS" | tr ',' '\n' | grep -aE '^[0-9]+$' | jq -s '.')"

        PAYLOAD="$(jq -n \
          --arg type "$TYPE" --arg name "$NAME" --arg domain "$DOMAIN" --arg landing "$LANDING_ID" \
          --argjson cats "$CATS_JSON" \
          --arg locale "$LOCALE" --arg from_email "$FROM_EMAIL" --arg from_name "$FROM_NAME" \
          --arg replyto "$REPLYTO" --arg subject "$SUBJECT" --arg body "$BODY" \
          '{type:$type, name:$name, domain:$domain, description:"Generated by Satori template-ai", template_type:"phishing", categories:$cats,
            localizations:[{locale:$locale, default:true, from_email:$from_email, from_name:$from_name, replyto_email:$replyto, subject:$subject, body:$body}]}
           | if ($landing|length)>0 then .landing_id=$landing else . end')"
        echo "template/create payload (body redacted):"; echo "$PAYLOAD" | jq '(.localizations[0].body) |= "[redacted]"' 2>/dev/null

        RESP="$(curl -s -X POST "$BASE/template/create" -H "$AUTH" -H "$CT" --data "$PAYLOAD")"
        echo "template/create response: $RESP"
        TID="$(echo "$RESP" | jq -r '(.data.id // .data.uuid // .data.template.id // .id // empty)')"
        if [ -z "$TID" ]; then echo "Could not create template (see response above)"; exit 1; fi
        echo "TEMPLATE_UUID=$TID"
        echo "DONE template=$TID name=$NAME type=$TYPE domain=$DOMAIN landing=${LANDING_ID:-none}"
