settings:
  name: "SEC Filings: Cyber incident and risk disclosures"
  description: "Searches SEC EDGAR for cybersecurity incident disclosures (8-K Item 1.05) and risk management descriptions (10-K Item 1C) for US public companies."
  image: debian
  author:
    - https://github.com/satorici
  example: satori run satori://compliance/sec-filings.yml -d COMPANY="SolarWinds" --report --output

sec-filings:
  install:
    - export DEBIAN_FRONTEND=noninteractive && apt-get update -qq && apt-get install -qy curl jq ca-certificates >>/dev/null

  search_8k_incidents:
    setSeverity: 2
    assertReturnCode: 0
    run:
      - |
        echo "=== SEC 8-K Cybersecurity Incident Disclosures ==="
        ENCODED=$(echo "${{COMPANY}}" | sed 's/ /+/g')
        RESULT=$(curl -s "https://efts.sec.gov/LATEST/search-index?q=%22${ENCODED}%22&forms=8-K&dateRange=custom&startdt=2023-12-01" \
          -H "User-Agent: Satori-CI satori@satori.ci")
        COUNT=$(echo "$RESULT" | jq '.hits.total.value // 0')
        echo "8-K filings mentioning ${{COMPANY}} since Dec 2023: $COUNT"
        echo "$RESULT" | jq -r '.hits.hits[]._source | "Date: \(.file_date) | Company: \(.display_names[0] // "N/A") | Form: \(.form // "N/A") | Items: \(.items // [] | join(", ")) | Filing: https://www.sec.gov/Archives/edgar/data/\(.ciks[0])/\(.adsh | gsub("-";""))/\(.adsh).txt"' 2>/dev/null | head -20

  search_cyber_8k:
    setSeverity: 1
    assertStdoutNotContains: "CYBER_INCIDENT_DISCLOSED"
    run:
      - |
        echo "=== SEC 8-K Cybersecurity Incident Disclosure ==="
        ENCODED=$(echo "${{COMPANY}}" | sed 's/ /+/g')
        RESULT=$(curl -s "https://efts.sec.gov/LATEST/search-index?q=%22${ENCODED}%22+%22cybersecurity+incident%22&forms=8-K&dateRange=custom&startdt=2023-12-01" \
          -H "User-Agent: Satori-CI satori@satori.ci")
        COUNT=$(echo "$RESULT" | jq '.hits.total.value // 0')
        echo "8-K cyber incident filings found: $COUNT"
        if [ "$COUNT" -gt 0 ]; then
          echo "$RESULT" | jq -r '.hits.hits[]._source | "Date: \(.file_date) | Company: \(.display_names[0] // "N/A") | Items: \(.items // [] | join(", "))"' 2>/dev/null | head -10
          echo "CYBER_INCIDENT_DISCLOSED: ${{COMPANY}} has disclosed cybersecurity incidents via SEC 8-K"
        fi

  search_10k_risk:
    setSeverity: 4
    assertReturnCode: 0
    run:
      - |
        echo "=== SEC 10-K Annual Filings ==="
        ENCODED=$(echo "${{COMPANY}}" | sed 's/ /+/g')
        RESULT=$(curl -s "https://efts.sec.gov/LATEST/search-index?q=%22${ENCODED}%22&forms=10-K&dateRange=custom&startdt=2023-01-01" \
          -H "User-Agent: Satori-CI satori@satori.ci")
        COUNT=$(echo "$RESULT" | jq '.hits.total.value // 0')
        echo "10-K filings found: $COUNT"
        echo "$RESULT" | jq -r '.hits.hits[]._source | "Date: \(.file_date) | Company: \(.display_names[0] // "N/A") | Filing: https://www.sec.gov/Archives/edgar/data/\(.ciks[0])/\(.adsh | gsub("-";""))/\(.adsh).txt"' 2>/dev/null | head -10
        if [ "$COUNT" -eq 0 ]; then
          echo "Note: Company may be private or non-US"
        fi
