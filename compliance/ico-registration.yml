settings:
  name: "ICO Registration: UK data controller check"
  description: "Checks UK Information Commissioner's Office (ICO) data controller registration status by searching the ICO register."
  image: debian
  author:
    - https://github.com/satorici
  example: satori run satori://compliance/ico-registration.yml -d COMPANY="Quorum Cyber" --report --output

ico-registration:
  install:
    - command -v curl >/dev/null 2>&1 || (export DEBIAN_FRONTEND=noninteractive && apt-get update -qq && apt-get install -qy curl ca-certificates >>/dev/null)

  check_registration:
    assertStdoutContains: "ICO Registration:"
    setSeverity: 3
    run:
      - |
        echo "=== ICO Data Controller Registration Check ==="
        echo "Company: ${{COMPANY}}"

        COOKIES=$(mktemp)
        PAGE=$(curl -sL -c "$COOKIES" "https://ico.org.uk/ESDWebPages/Search")
        TOKEN=$(echo "$PAGE" | grep -oE 'name="__RequestVerificationToken"[^>]*value="[^"]*"' \
          | grep -oE 'value="[^"]*"' | head -1 | sed 's/value="//;s/"//')

        RESULT=$(curl -sL -b "$COOKIES" "https://ico.org.uk/ESDWebPages/DoSearch" \
          --data-urlencode "__RequestVerificationToken=$TOKEN" \
          --data-urlencode "fieldname=${{COMPANY}}" \
          --data-urlencode "fieldregistration=" \
          --data-urlencode "fieldpostcode=")

        REG_NUM=$(echo "$RESULT" | grep -oE 'Z[AB][0-9]{6}' | head -1)
        MATCH=$(echo "$RESULT" | grep -oiE "[^>]*${{COMPANY}}[^<]*" | head -1 | sed 's/^[[:space:]]*//;s/[[:space:]]*|[[:space:]]*ICO[[:space:]]*$//')

        if [ -n "$REG_NUM" ]; then
          echo "ICO Registration: $REG_NUM"
          echo "Registered name: ${MATCH:-${{COMPANY}}}"
        else
          echo "No ICO registration found for ${{COMPANY}}"
        fi
