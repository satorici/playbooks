settings:
  name: "ICO Registration: UK data controller check"
  description: "Checks UK Information Commissioner's Office (ICO) data controller registration status by searching the ICO register."
  image: debian
  author:
    - https://github.com/satorici
  example: satori run satori://compliance/ico-registration.yml -d COMPANY="Quorum Cyber" --report --output

ico-registration:
  install:
    - export DEBIAN_FRONTEND=noninteractive && apt-get update -qq && apt-get install -qy curl ca-certificates >>/dev/null

  check_registration:
    assertReturnCode: 0
    run:
      - |
        echo "=== ICO Data Controller Registration Check ==="
        echo "Company: ${{COMPANY}}"
        ENCODED=$(echo "${{COMPANY}}" | sed 's/ /+/g')
        RESULT=$(curl -sL "https://ico.org.uk/ESDWebPages/Search?fieldcompanyname=${ENCODED}")
        REG_NUM=$(echo "$RESULT" | grep -oE 'Z[A-Z0-9]{6,7}' | head -1 || true)
        if [ -n "$REG_NUM" ]; then
          echo "ICO Registration: $REG_NUM"
          DETAILS=$(curl -sL "https://ico.org.uk/ESDWebPages/Entry/$REG_NUM")
          echo "$DETAILS" | grep -oE '<td[^>]*>[^<]+</td>' | sed 's/<[^>]*>//g' | head -20
        else
          echo "No ICO registration found for ${{COMPANY}}"
        fi
