settings:
  name: "ICO Registration: UK data controller check"
  description: "Checks UK Information Commissioner's Office (ICO) data controller registration status by searching the ICO register."
  image: debian
  author:
    - https://github.com/satorici
  example: satori run satori://compliance/ico-registration.yml -d COMPANY="Quorum Cyber" --report --output

ico-registration:
  install:
    - command -v curl >/dev/null 2>&1 || (export DEBIAN_FRONTEND=noninteractive && apt-get update -qq && apt-get install -qy curl ca-certificates >>/dev/null)

  check_registration:
    assertReturnCode: 0
    run:
      - |
        echo "=== ICO Data Controller Registration Check ==="
        echo "Company: ${{COMPANY}}"
        for SUFFIX in "" " Limited" " Ltd" " Security Limited" " Security Ltd"; do
          SEARCH="${{COMPANY}}${SUFFIX}"
          ENCODED=$(echo "$SEARCH" | sed 's/ /+/g')
          RESULT=$(curl -sL -X POST "https://ico.org.uk/ESDWebPages/Search" \
            -d "fieldcompanyname=${ENCODED}&fieldregistration=&fieldpostcode=&fieldstartdate=&fieldenddate=" \
            -H "Content-Type: application/x-www-form-urlencoded")
          REG_NUM=$(echo "$RESULT" | grep -oE 'Z[A-Z0-9]{5,8}' | head -1)
          if [ -n "$REG_NUM" ]; then
            echo "ICO Registration: $REG_NUM (matched: $SEARCH)"
            DETAILS=$(curl -sL "https://ico.org.uk/ESDWebPages/Entry/$REG_NUM")
            echo "$DETAILS" | grep -oE '<td[^>]*>[^<]+</td>' | sed 's/<[^>]*>//g' | head -20
            exit 0
          fi
        done
        echo "No ICO registration found for ${{COMPANY}}"
