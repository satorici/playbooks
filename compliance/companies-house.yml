settings:
  name: "Companies House: UK corporate structure mapping"
  description: "Queries the UK Companies House API to map corporate structure, directors, filing history, subsidiaries, charges, and insolvency. Requires COMPANIES_HOUSE_API_KEY (free registration at developer.company-information.service.gov.uk). Only acts on a confident name match — fuzzy/unrelated search hits are rejected (NO_MATCH) so downstream consumers never see the wrong company."
  image: debian
  author:
    - https://github.com/satorici
  example: satori run satori://compliance/companies-house.yml -d COMPANY="Example Ltd" -d COMPANIES_HOUSE_API_KEY="your_key" --report --output
  redacted:
    - COMPANIES_HOUSE_API_KEY

companies-house:
  install:
    - command -v curl >/dev/null 2>&1 && command -v jq >/dev/null 2>&1 || (export DEBIAN_FRONTEND=noninteractive && apt-get update -qq && apt-get install -qy curl jq ca-certificates >>/dev/null)

  # Resolve a CONFIDENT company number: the result title (normalised) must contain
  # the full company name (normalised). Companies House search is fuzzy and returns
  # unrelated hits (e.g. "Satori CI" → "G K SATORI LTD"); taking .items[0] blindly
  # pulled the wrong company. Every step re-validates with this same gate.
  search_company:
    setSeverity: 5
    assertReturnCode: 0
    run:
      - |
        echo "=== Companies House Match: ${{COMPANY}} ==="
        TARGET=$(echo "${{COMPANY}}" | tr 'A-Z' 'a-z' | tr -cd 'a-z0-9')
        ENCODED=$(echo "${{COMPANY}}" | sed 's/ /%20/g')
        RESULT=$(curl -s -u "${{COMPANIES_HOUSE_API_KEY}}:" \
          "https://api.company-information.service.gov.uk/search/companies?q=${ENCODED}&items_per_page=20")
        MATCH=$(echo "$RESULT" | jq -r --arg t "$TARGET" \
          '.items[]? | select((.title|ascii_downcase|gsub("[^a-z0-9]";"")) | contains($t)) | .company_number' | head -1)
        if [ -z "$MATCH" ] || [ "$MATCH" = "null" ]; then
          echo "NO_MATCH: no UK company confidently matching '${{COMPANY}}' (fuzzy search hits rejected)"
          exit 0
        fi
        echo "$RESULT" | jq -r --arg n "$MATCH" '.items[]? | select(.company_number==$n) |
          "Company: \(.title)\n  Number: \(.company_number)\n  Status: \(.company_status)\n  Type: \(.company_type)\n  Incorporated: \(.date_of_creation)\n  Address: \(.address_snippet)"'
        echo "CONFIDENT_MATCH: $MATCH"

  company_profile:
    setSeverity: 5
    assertReturnCode: 0
    run:
      - |
        TARGET=$(echo "${{COMPANY}}" | tr 'A-Z' 'a-z' | tr -cd 'a-z0-9')
        ENCODED=$(echo "${{COMPANY}}" | sed 's/ /%20/g')
        COMPANY_NUMBER=$(curl -s -u "${{COMPANIES_HOUSE_API_KEY}}:" \
          "https://api.company-information.service.gov.uk/search/companies?q=${ENCODED}&items_per_page=20" \
          | jq -r --arg t "$TARGET" '.items[]? | select((.title|ascii_downcase|gsub("[^a-z0-9]";"")) | contains($t)) | .company_number' | head -1)
        if [ -z "$COMPANY_NUMBER" ] || [ "$COMPANY_NUMBER" = "null" ]; then echo "NO_MATCH: ${{COMPANY}}"; exit 0; fi
        echo "=== Company Profile: $COMPANY_NUMBER ==="
        curl -s -u "${{COMPANIES_HOUSE_API_KEY}}:" \
          "https://api.company-information.service.gov.uk/company/$COMPANY_NUMBER" | \
          jq '{
            name: .company_name,
            number: .company_number,
            status: .company_status,
            type: .type,
            incorporated: .date_of_creation,
            address: .registered_office_address,
            sic_codes: .sic_codes,
            accounts_next_due: .accounts.next_due,
            confirmation_next_due: .confirmation_statement.next_due
          }'

  officers:
    setSeverity: 5
    assertReturnCode: 0
    run:
      - |
        TARGET=$(echo "${{COMPANY}}" | tr 'A-Z' 'a-z' | tr -cd 'a-z0-9')
        ENCODED=$(echo "${{COMPANY}}" | sed 's/ /%20/g')
        COMPANY_NUMBER=$(curl -s -u "${{COMPANIES_HOUSE_API_KEY}}:" \
          "https://api.company-information.service.gov.uk/search/companies?q=${ENCODED}&items_per_page=20" \
          | jq -r --arg t "$TARGET" '.items[]? | select((.title|ascii_downcase|gsub("[^a-z0-9]";"")) | contains($t)) | .company_number' | head -1)
        if [ -z "$COMPANY_NUMBER" ] || [ "$COMPANY_NUMBER" = "null" ]; then echo "NO_MATCH: ${{COMPANY}}"; exit 0; fi
        echo "=== Officers for $COMPANY_NUMBER ==="
        curl -s -u "${{COMPANIES_HOUSE_API_KEY}}:" \
          "https://api.company-information.service.gov.uk/company/$COMPANY_NUMBER/officers" | \
          jq -r '.items[]? | "Name: \(.name)\n  Role: \(.officer_role)\n  Appointed: \(.appointed_on)\n  Resigned: \(.resigned_on // "Active")\n"'

  filing_history:
    setSeverity: 5
    assertReturnCode: 0
    run:
      - |
        TARGET=$(echo "${{COMPANY}}" | tr 'A-Z' 'a-z' | tr -cd 'a-z0-9')
        ENCODED=$(echo "${{COMPANY}}" | sed 's/ /%20/g')
        COMPANY_NUMBER=$(curl -s -u "${{COMPANIES_HOUSE_API_KEY}}:" \
          "https://api.company-information.service.gov.uk/search/companies?q=${ENCODED}&items_per_page=20" \
          | jq -r --arg t "$TARGET" '.items[]? | select((.title|ascii_downcase|gsub("[^a-z0-9]";"")) | contains($t)) | .company_number' | head -1)
        if [ -z "$COMPANY_NUMBER" ] || [ "$COMPANY_NUMBER" = "null" ]; then echo "NO_MATCH: ${{COMPANY}}"; exit 0; fi
        echo "=== Recent Filings for $COMPANY_NUMBER ==="
        curl -s -u "${{COMPANIES_HOUSE_API_KEY}}:" \
          "https://api.company-information.service.gov.uk/company/$COMPANY_NUMBER/filing-history?items_per_page=10" | \
          jq -r '.items[]? | "Date: \(.date) | Type: \(.type) | Description: \(.description)"'

  charges:
    setSeverity: 5
    assertReturnCode: 0
    run:
      - |
        TARGET=$(echo "${{COMPANY}}" | tr 'A-Z' 'a-z' | tr -cd 'a-z0-9')
        ENCODED=$(echo "${{COMPANY}}" | sed 's/ /%20/g')
        COMPANY_NUMBER=$(curl -s -u "${{COMPANIES_HOUSE_API_KEY}}:" \
          "https://api.company-information.service.gov.uk/search/companies?q=${ENCODED}&items_per_page=20" \
          | jq -r --arg t "$TARGET" '.items[]? | select((.title|ascii_downcase|gsub("[^a-z0-9]";"")) | contains($t)) | .company_number' | head -1)
        if [ -z "$COMPANY_NUMBER" ] || [ "$COMPANY_NUMBER" = "null" ]; then echo "NO_MATCH: ${{COMPANY}}"; exit 0; fi
        echo "=== Charges (Mortgages/Security) for $COMPANY_NUMBER ==="
        curl -s -u "${{COMPANIES_HOUSE_API_KEY}}:" \
          "https://api.company-information.service.gov.uk/company/$COMPANY_NUMBER/charges" | \
          jq -r '.items[]? | "Status: \(.status) | Created: \(.created_on) | Delivered: \(.delivered_on) | Persons: \(.persons_entitled[0]?.name // "N/A")"' 2>/dev/null || echo "No charges found"

  insolvency:
    setSeverity: 5
    assertReturnCode: 0
    run:
      - |
        TARGET=$(echo "${{COMPANY}}" | tr 'A-Z' 'a-z' | tr -cd 'a-z0-9')
        ENCODED=$(echo "${{COMPANY}}" | sed 's/ /%20/g')
        COMPANY_NUMBER=$(curl -s -u "${{COMPANIES_HOUSE_API_KEY}}:" \
          "https://api.company-information.service.gov.uk/search/companies?q=${ENCODED}&items_per_page=20" \
          | jq -r --arg t "$TARGET" '.items[]? | select((.title|ascii_downcase|gsub("[^a-z0-9]";"")) | contains($t)) | .company_number' | head -1)
        if [ -z "$COMPANY_NUMBER" ] || [ "$COMPANY_NUMBER" = "null" ]; then echo "NO_MATCH: ${{COMPANY}}"; exit 0; fi
        echo "=== Insolvency History for $COMPANY_NUMBER ==="
        RESULT=$(curl -s -u "${{COMPANIES_HOUSE_API_KEY}}:" \
          "https://api.company-information.service.gov.uk/company/$COMPANY_NUMBER/insolvency")
        STATUS=$(echo "$RESULT" | jq -r '.status // empty' 2>/dev/null)
        if [ -n "$STATUS" ] && [ "$STATUS" != "null" ]; then
          echo "$RESULT" | jq -r '.cases[]? | "Type: \(.type) | Date: \(.dates[0]?.date // "N/A") | Notes: \(.notes[0] // "N/A")"' 2>/dev/null
        else
          echo "No insolvency history"
        fi

  persons_significant_control:
    setSeverity: 5
    assertReturnCode: 0
    run:
      - |
        TARGET=$(echo "${{COMPANY}}" | tr 'A-Z' 'a-z' | tr -cd 'a-z0-9')
        ENCODED=$(echo "${{COMPANY}}" | sed 's/ /%20/g')
        COMPANY_NUMBER=$(curl -s -u "${{COMPANIES_HOUSE_API_KEY}}:" \
          "https://api.company-information.service.gov.uk/search/companies?q=${ENCODED}&items_per_page=20" \
          | jq -r --arg t "$TARGET" '.items[]? | select((.title|ascii_downcase|gsub("[^a-z0-9]";"")) | contains($t)) | .company_number' | head -1)
        if [ -z "$COMPANY_NUMBER" ] || [ "$COMPANY_NUMBER" = "null" ]; then echo "NO_MATCH: ${{COMPANY}}"; exit 0; fi
        echo "=== Persons of Significant Control for $COMPANY_NUMBER ==="
        curl -s -u "${{COMPANIES_HOUSE_API_KEY}}:" \
          "https://api.company-information.service.gov.uk/company/$COMPANY_NUMBER/persons-with-significant-control" | \
          jq -r '.items[]? | "Name: \(.name) | Nationality: \(.nationality // "N/A") | Country: \(.country_of_residence // "N/A") | Nature: \(.natures_of_control // [] | join(", "))"' 2>/dev/null || echo "No PSC data"
