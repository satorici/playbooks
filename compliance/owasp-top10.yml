settings:
  name: "OWASP Top 10: Web application security assessment"
  description: "Runs a vulnerability scan using Nuclei with OWASP Top 10 templates to detect common web application security issues including injection, broken authentication, sensitive data exposure, XXE, broken access control, security misconfiguration, XSS, insecure deserialization, vulnerable components, and insufficient logging."
  image: debian
  timeout: 1800
  author:
    - https://github.com/satorici
  example: satori run satori://compliance/owasp-top10.yml -d URL="http://testphp.vulnweb.com/" --report --output

owasp:
  install:
    - apt-get update >>/dev/null; apt-get install -qy curl unzip >>/dev/null
    - curl -sSL https://github.com/projectdiscovery/nuclei/releases/latest/download/nuclei_$(curl -sSL https://api.github.com/repos/projectdiscovery/nuclei/releases/latest | grep tag_name | cut -d '"' -f4 | sed 's/v//')_linux_amd64.zip -o /tmp/nuclei.zip && unzip -q /tmp/nuclei.zip -d /usr/local/bin
    - curl -sSL https://github.com/projectdiscovery/katana/releases/latest/download/katana_$(curl -sSL https://api.github.com/repos/projectdiscovery/katana/releases/latest | grep tag_name | cut -d '"' -f4 | sed 's/v//')_linux_amd64.zip -o /tmp/katana.zip && unzip -qo /tmp/katana.zip -d /usr/local/bin
    - nuclei -update-templates 2>>/dev/null

  run:
    - timeout 120 katana -u ${{URL}} -d 3 -silent -o /tmp/urls.txt >/dev/null 2>/dev/null
    - timeout 180 nuclei -l /tmp/urls.txt -dast -c 25 -rate-limit 50 -timeout 10 -silent

  critical:
    setOutput: owasp.run
    setSeverity: 1
    assertStdoutNotContains: "critical"

  high:
    setOutput: owasp.run
    setSeverity: 2
    assertStdoutNotContains: "high"

  medium:
    setOutput: owasp.run
    setSeverity: 3
    assertStdoutNotContains: "medium"
