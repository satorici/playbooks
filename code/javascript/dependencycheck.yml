settings:
  name: "OWASP DependencyCheck: verifies publicly disclosed vulnerabilities in project's dependencies"
  description: "OWASP DependencyCheck is a multi-language Software Composition Analysis (SCA) tool. While it is commonly used in Java projects, it also supports scanning dependencies for other ecosystems, including .NET, Node.js, Python, Ruby, PHP, and more."
  image: satori
  author:
    - https://github.com/jeremylong
  gallery:
    - https://files.catbox.moe/x3ffkf.gif
  example: satori run ./ --playbook satori://code/javascript/dependencycheck.yml --report --output

dependency-check:
  install:
    - cd /tmp; wget -q https://github.com/jeremylong/DependencyCheck/releases/download/v12.1.0/dependency-check-12.1.0-release.zip; unzip dependency-check-12.1.0-release.zip >>/dev/null

  help:
    - /tmp/dependency-check/bin/dependency-check.sh --help

  scan:
    - /tmp/dependency-check/bin/dependency-check.sh --scan "./" -f CSV --nvdApiKey ${{NVD_API_KEY}}
    - cat /data/dependency-check-report.csv

  test:
    assertStdout: False
    highest:
      - grep HIGHEST /data/dependency-check-report.csv
