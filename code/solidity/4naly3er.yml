settings:
  name: "4naly3er: Solidity audit issue detector"
  description: |
    4naly3er is a Solidity static analyzer built for competitive audits and bug
    bounties. It scans for gas optimizations, quality assurance issues, and
    low-severity findings commonly reported in Code4rena, Sherlock, and other
    audit contest platforms. Ideal for pre-audit preparation of DeFi protocols.
  image: node:20-slim
  author:
    - https://github.com/Picodes
  example: satori run satori://code/solidity/4naly3er.yml --repo smartbugs/smartbugs-curated --report --output

analyzer:
  install:
    - apt-get update -qq >/dev/null 2>&1 && apt-get install -qy git curl >/dev/null 2>&1
    - git clone --depth 1 -q https://github.com/Picodes/4naly3er.git /tmp/4naly3er
    - cd /tmp/4naly3er && yarn install 2>/dev/null || npm install 2>/dev/null || true
    - if [ -f foundry.toml ]; then curl -sL https://foundry.paradigm.xyz | bash 2>/dev/null; export PATH="$HOME/.foundry/bin:$PATH"; foundryup 2>/dev/null; forge install 2>&1; fi || true

  run:
    - cd /tmp/4naly3er && npx ts-node src/index.ts $OLDPWD/src 2>&1 || npx ts-node src/index.ts $OLDPWD 2>&1 || true
    - cat /tmp/4naly3er/report.md 2>/dev/null || true

  high:
    setOutput: analyzer.run
    setSeverity: 2
    assertStdoutNotContains: "[H-"

  medium:
    setOutput: analyzer.run
    setSeverity: 3
    assertStdoutNotContains: "[M-"

  low:
    setOutput: analyzer.run
    setSeverity: 4
    assertStdoutNotContains: "[L-"

  gas:
    setOutput: analyzer.run
    setSeverity: 5
    assertStdoutNotContains: "[GAS-"
