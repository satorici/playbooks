settings:
  name: "Semgrep: Solidity security rules"
  description: |
    Semgrep with Solidity-specific security rulesets for detecting common smart
    contract vulnerabilities including reentrancy, unchecked calls, price oracle
    manipulation, flash loan attacks, access control issues, and DeFi-specific
    anti-patterns.
  image: python:3.10-slim
  author:
    - https://github.com/semgrep
  example: satori run satori://code/solidity/semgrep-solidity.yml --repo SunWeb3Sec/DeFiVulnLabs --report --output

semgrep:
  install:
    - pip install semgrep -q --disable-pip-version-check --root-user-action=ignore
    - apt-get update -qq >/dev/null 2>&1 && apt-get install -qy git >/dev/null 2>&1 || true
    - git clone --depth 1 -q https://github.com/Decurity/semgrep-smart-contracts.git /tmp/semgrep-rules 2>/dev/null || true

  run:
    - semgrep --config /tmp/semgrep-rules/solidity/ --config auto --include "*.sol" --max-chars-per-line 1024 -q 2>&1 || true

  high:
    setOutput: semgrep.run
    setSeverity: 2
    assertStdoutNotContains: " ❯❯❱ "

  medium:
    setOutput: semgrep.run
    setSeverity: 3
    assertStdoutNotContains: " ❯❱ "
