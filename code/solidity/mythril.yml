settings:
  name: "Mythril: EVM bytecode security analysis"
  description: |
    Mythril is a security analysis tool for EVM bytecode. It detects security
    vulnerabilities in smart contracts built for Ethereum, Hedera, Quorum,
    Vechain, Rootstock, Tron, and other EVM-compatible blockchains using symbolic
    execution, SMT solving, and taint analysis.
  image: python:3.10
  cpu: 2048
  memory: 8192
  timeout: 1800
  author:
    - https://github.com/Consensys
  example: satori run satori://code/solidity/mythril.yml --repo crytic/not-so-smart-contracts --report --output

mythril:
  install:
    - apt-get update -qq >/dev/null 2>&1 && apt-get install -qy git curl >/dev/null 2>&1 || true
    - pip install mythril -q --disable-pip-version-check --root-user-action=ignore
    - if [ -f foundry.toml ]; then curl -sL https://foundry.paradigm.xyz | bash 2>/dev/null; export PATH="$HOME/.foundry/bin:$PATH"; foundryup 2>/dev/null; forge install 2>&1; fi || true

  run:
    - |
      export PATH="$HOME/.foundry/bin:$PATH"
      SOLCJSON=""
      if [ -f foundry.toml ] && command -v forge >/dev/null 2>&1; then
        REMAPS=$(forge config --json 2>/dev/null | python3 -c "
      import sys,json
      c=json.load(sys.stdin)
      r=c.get('remappings',[])
      if r:
        d={'remappings':r}
        json.dump(d,sys.stdout)
      " 2>/dev/null)
        if [ -n "$REMAPS" ]; then echo "$REMAPS" > /tmp/solc-remap.json; SOLCJSON="--solc-json /tmp/solc-remap.json"; fi
      fi
      for sol in $(find . -name "*.sol" -not -path "*/node_modules/*" -not -path "*/lib/*" | head -10); do
        VER=$(grep 'pragma solidity' "$sol" 2>/dev/null | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+' | head -1)
        echo "=== Analyzing $sol (solc ${VER:-0.8.28}) ==="
        myth analyze "$sol" --solv "${VER:-0.8.28}" $SOLCJSON --execution-timeout 120 2>&1 || true
      done

  critical:
    setOutput: mythril.run
    setSeverity: 1
    assertStdoutNotContains:
      - "SWC ID: 107"
      - "SWC ID: 106"
      - "SWC ID: 112"
      - "SWC ID: 114"

  high:
    setOutput: mythril.run
    setSeverity: 2
    assertStdoutNotContains:
      - "SWC ID: 101"
      - "SWC ID: 104"
      - "SWC ID: 105"
      - "SWC ID: 113"
      - "SWC ID: 115"
      - "SWC ID: 124"

  medium:
    setOutput: mythril.run
    setSeverity: 3
    assertStdoutNotContains:
      - "SWC ID: 110"
      - "SWC ID: 116"
      - "SWC ID: 120"
      - "SWC ID: 132"
