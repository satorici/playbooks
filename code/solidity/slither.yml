settings:
  name: "Slither: Solidity & DeFi static analysis"
  description: |
    Slither is a Solidity & Vyper static analysis framework that runs a suite of
    vulnerability detectors, prints visual information about contract details, and
    provides an API to easily write custom analyses. It is the industry standard
    for smart contract SAST, detecting reentrancy, unprotected upgrades, unchecked
    low-level calls, and 90+ other vulnerability patterns.
  image: python:3.10-slim
  author:
    - https://github.com/crytic
  example: satori run satori://code/solidity/slither.yml --repo SunWeb3Sec/DeFiVulnLabs --report --output

slither:
  install:
    - apt-get update -qq >/dev/null 2>&1 && apt-get install -qy git curl >/dev/null 2>&1 || true
    - pip install slither-analyzer solc-select -q --disable-pip-version-check --root-user-action=ignore
    - if [ -f foundry.toml ]; then curl -sL https://foundry.paradigm.xyz | bash 2>/dev/null; $HOME/.foundry/bin/foundryup -q 2>/dev/null; export PATH="$HOME/.foundry/bin:$PATH"; forge install --no-commit 2>/dev/null || true; fi
    - for ver in $(grep -roh 'pragma solidity.*[0-9]\+\.[0-9]\+\.[0-9]\+' --include='*.sol' . 2>/dev/null | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+' | sort -uV); do solc-select install $ver 2>/dev/null || true; done
    - LATEST=$(grep -roh 'pragma solidity.*[0-9]\+\.[0-9]\+\.[0-9]\+' --include='*.sol' . 2>/dev/null | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+' | sort -uV | tail -1); solc-select use ${LATEST:-0.8.28}

  run:
    - export PATH="$HOME/.foundry/bin:$PATH"; slither . 2>&1 || for sol in $(find . -name "*.sol" -not -path "*/node_modules/*" -not -path "*/lib/*" | head -30); do slither "$sol" 2>&1 || true; done

  critical:
    setOutput: slither.run
    setSeverity: 1
    assertStdoutNotContains:
      - "Reentrancy"
      - "Unprotected upgrade"
      - "Arbitrary send"
      - "Suicidal"
      - "Delegatecall to a user-supplied address"

  high:
    setOutput: slither.run
    setSeverity: 2
    assertStdoutNotContains:
      - "Controlled delegatecall"
      - "Unchecked transfer"
      - "Unchecked low-level call"
      - "Uninitialized state variable"
      - "Uninitialized storage variable"
      - "State variable shadowing"
      - "Tautological comparison"
      - "Missing zero address validation"

  medium:
    setOutput: slither.run
    setSeverity: 3
    assertStdoutNotContains:
      - "Dangerous strict equality"
      - "Block timestamp"
      - "Unused return"
      - "Incorrect modifier"
      - "Locked ether"
      - "Divide before multiply"

  low:
    setOutput: slither.run
    setSeverity: 4
    assertStdoutNotContains:
      - "Calls inside a loop"
      - "Missing events"
      - "Reentrancy with events"
      - "Incorrect versions of Solidity"
      - "Low-level calls"
      - "Boolean equality"
