settings:
  name: bloky
  description: "Bloky detects blocking operations in Python async code that could cause performance issues."
  image: python
  author:
    - https://github.com/satorici
  example: satori run satori://code/python/bloky.yml --repo satorici/satori-cli --report --output

install:
  - command -v bloky >/dev/null || pip install bloky -q --disable-pip-version-check --root-user-action=ignore

bloky:
  assertStdoutNotContains: BLOCKING OPERATIONS DETECTED
  run:
    - bloky .
