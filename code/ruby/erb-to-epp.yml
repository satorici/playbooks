settings:
  name: ERB to EPP
  description: "Embedded Ruby (.erb) into Embedded Puppet (.epp)"
  image: satori
  author:
    - https://github.com/artonix101
  example: satori run ./ --playbook satori://code/ruby/erb-to-epp.yml --report --output

install:
  - test -e /tmp/erb-to-epp >/dev/null || cd /tmp; git clone --depth 1 https://github.com/artonix101/erb-to-epp.git; cd erb-to-epp; cargo build --release

erb_to_epp:
  - ls -lR
  - find . -type f -name '*.erb' -exec /tmp/erb-to-epp/target/release/erb-to-epp {} \;
