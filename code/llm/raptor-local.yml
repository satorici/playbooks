settings:
  name: "RAPTOR - LLM Security Research (local model)"
  description: "Runs RAPTOR in agentic mode against source code: Semgrep static analysis plus LLM-driven exploitability validation, proof-of-concept generation and patch writing, powered by a local model. Choose the model with -d MODEL."
  author:
    - https://github.com/gadievron
  timeout: 5400
  files: false   # findings and report print to stdout as separate test steps below
  example: satori local satori://code/llm/raptor-local.yml --repo OWASP/NodeGoat -d MODEL="qwen3.6-35b" --output

raptor:
  install:
    # Clone RAPTOR into /tmp (just source; no Python deps installed here).
    - test -d /tmp/raptor/.claude || git clone --depth 1 https://github.com/gadievron/raptor.git /tmp/raptor
    # uv: a single self-contained binary used to run RAPTOR in a throwaway env (nothing installed into system Python).
    - command -v uv >/dev/null 2>&1 || curl -LsSf https://astral.sh/uv/install.sh | sh
    # Semgrep as an ISOLATED uv tool (its own env) so RAPTOR finds it on PATH without clashing with RAPTOR deps
    # (bundling semgrep into RAPTOR's env breaks its opentelemetry import). rm -rf first to avoid stale state.
    - export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"; rm -rf /tmp/semgrep /tmp/bin && UV_TOOL_DIR=/tmp UV_TOOL_BIN_DIR=/tmp/bin uv tool install --force --python 3.12 -q semgrep

  run:
    - |
      # --- LOCAL MODEL: RAPTOR analyses via its Claude Code provider (the `claude` CLI). Point that CLI at a
      # local model server that exposes the Anthropic /v1/messages API (default http://localhost:8000).
      # IMPORTANT: do NOT set ANTHROPIC_API_KEY — that makes RAPTOR pick a hosted Claude model as primary and
      # pass it to claude (the local server has no such model). With only AUTH_TOKEN + MODEL set, RAPTOR drives
      # claude with the local model named in -d MODEL.
      export ANTHROPIC_BASE_URL="http://localhost:8000"
      export ANTHROPIC_AUTH_TOKEN="local"
      export ANTHROPIC_MODEL="${{MODEL}}"
      export ANTHROPIC_SMALL_FAST_MODEL="${{MODEL}}"
      # The local model serves a finite context (not 1M) — keep Claude Code from requesting the 1M beta.
      export CLAUDE_CODE_DISABLE_1M_CONTEXT=1
      # Hygiene for a sandboxed/offline run: suppress Claude Code external calls (telemetry, updater, error
      # reporting, other non-essential traffic) that the sandbox would block anyway and that add noise/latency.
      export CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1 DISABLE_TELEMETRY=1 DISABLE_AUTOUPDATER=1 DISABLE_ERROR_REPORTING=1
      # A local model can be slow per call; widen the Claude Code request timeout to 30 min.
      export API_TIMEOUT_MS=1800000
      # RAPTOR refuses agentic mode as root unless it detects a sandbox.
      export IS_SANDBOX=1
      # uv is in ~/.local/bin; the isolated semgrep binary is in /tmp/bin.
      export PATH="/tmp/bin:$HOME/.local/bin:$HOME/.cargo/bin:$PATH"

      # Satori cloned the target repo (via --repo) into the cwd; RAPTOR analyses it.
      TARGET="$(pwd)"; cd /tmp/raptor
      timeout --signal=INT 5100 \
        uv run --no-project --python 3.12 --with-requirements /tmp/raptor/requirements.txt \
        python raptor.py agentic --repo "$TARGET" --out /tmp/raptor-out \
        > /tmp/raptor.log 2>&1
      RC=$?
      [ "$RC" = "124" ] && echo "WARN: RAPTOR hit the run cap (killed by timeout)"
      echo "==================== RAPTOR LOG ===================="
      cat /tmp/raptor.log
      echo "[gate] raptor exit code: $RC"
      exit $RC
  ran:
    setOutput: raptor.run
    assertReturnCode: 0

# Validated findings (RAPTOR writes them to a fixed path under the output dir).
# Per-severity gates assert on findings.list stdout (severity_assessment from the LLM validation).
findings:
  list:
    - cat /tmp/raptor-out/validation/findings.json
  critical:
    setOutput: findings.list
    setSeverity: 1
    assertStdoutNotContains: '"severity_assessment": "critical"'
  high:
    setOutput: findings.list
    setSeverity: 2
    assertStdoutNotContains: '"severity_assessment": "high"'
  medium:
    setOutput: findings.list
    setSeverity: 3
    assertStdoutNotContains: '"severity_assessment": "medium"'
  report:
    - cat /tmp/raptor-out/agentic-report.md
