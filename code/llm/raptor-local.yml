settings:
  name: "RAPTOR - LLM Security Research (local model)"
  description: "Local-model variant of code/llm/raptor.yml. Runs RAPTOR (gadievron/raptor) in AGENTIC mode against SOURCE CODE: Semgrep static analysis + LLM-driven exploitability validation, PoC and patch writing, with its LLM dispatcher pointed at the LOCAL vLLM on pgx (ANTHROPIC_BASE_URL=http://localhost:8000, the Anthropic /v1/messages API). Pass the code with Satori's native --repo <git-url>. Launched with `satori local` ON pgx; RAPTOR runs via `uv run` (throwaway env), semgrep is isolated in /tmp/semgrep, nothing is installed into the host Python. Mode is hardcoded to agentic on purpose — for static-only Semgrep use code/semgrep.yml. Pick the model with -d MODEL."
  timeout: 5400
  files: false   # do not upload artifacts; findings print to stdout (validated findings + SARIF under /tmp)
  example: satori local satori://code/llm/raptor-local.yml --repo OWASP/NodeGoat -d MODEL="qwen3.6-35b" --output

raptor:
  install:
    # Clone RAPTOR into /tmp (just source; no Python deps installed). Nothing of RAPTOR in $HOME.
    - test -d /tmp/raptor/.claude || git clone --depth 1 https://github.com/gadievron/raptor.git /tmp/raptor
    # uv is a single self-contained binary (fine to keep in ~/.local/bin); used to run RAPTOR in a throwaway env.
    - command -v uv >/dev/null 2>&1 || curl -LsSf https://astral.sh/uv/install.sh | sh
    # Semgrep as an ISOLATED uv tool (env in /tmp/semgrep, binary in /tmp/bin) so RAPTOR finds it on
    # PATH. NOT the host Python, NOT mixed with RAPTOR deps (that breaks its opentelemetry import).
    # rm -rf first so a stale env from a previous layout never trips `uv tool`.
    - export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"; rm -rf /tmp/semgrep && UV_TOOL_DIR=/tmp UV_TOOL_BIN_DIR=/tmp/bin uv tool install --python 3.12 -q semgrep

  run:
    - |
      # --- LOCAL MODEL: point the RAPTOR LLM dispatcher at the pgx vLLM (Anthropic /v1/messages) ---
      export ANTHROPIC_BASE_URL="http://localhost:8000"
      export ANTHROPIC_AUTH_TOKEN=""
      export ANTHROPIC_API_KEY="local"
      export ANTHROPIC_MODEL="${{MODEL}}"
      export ANTHROPIC_SMALL_FAST_MODEL="${{MODEL}}"
      export CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
      export CLAUDE_CODE_DISABLE_1M_CONTEXT=1
      export CLAUDE_AUTOCOMPACT_PCT_OVERRIDE=75
      export DISABLE_TELEMETRY=1 DISABLE_AUTOUPDATER=1 DISABLE_ERROR_REPORTING=1
      # Local 35B can be slow per turn; raise the LLM request timeout to 30 min.
      export API_TIMEOUT_MS=1800000
      # RAPTOR refuses agentic mode as root unless it detects a sandbox.
      export IS_SANDBOX=1
      # uv lives in ~/.local/bin; the isolated semgrep tool binary is in /tmp/bin.
      export PATH="/tmp/bin:$HOME/.local/bin:$HOME/.cargo/bin:$PATH"

      # Preflight: the local model must be reachable before we start.
      curl -sf -m 10 -o /dev/null "$ANTHROPIC_BASE_URL/v1/models" || { echo "[fatal] local model not reachable at $ANTHROPIC_BASE_URL (is vLLM up on pgx?)"; exit 1; }
      # Satori cloned the target repo (via --repo) into the cwd. Point RAPTOR at it.
      TARGET="$(pwd)"
      OUT=/tmp/raptor-out
      echo "Target: $TARGET  ($(find "$TARGET" -type f 2>/dev/null | wc -l) files)  MODE=agentic  MODEL=$ANTHROPIC_MODEL"
      # Ephemeral execution: uv resolves RAPTOR deps into a throwaway env (uv cache) pinned to Python
      # 3.12; semgrep comes from the isolated tool on PATH. Nothing is installed into the host Python.
      cd /tmp/raptor
      timeout --signal=INT 5100 \
        uv run --no-project --python 3.12 --with-requirements /tmp/raptor/requirements.txt \
        python raptor.py agentic --repo "$TARGET" --out "$OUT" \
        > /tmp/raptor.log 2>&1
      RC=$?
      [ "$RC" = "124" ] && echo "WARN: RAPTOR hit the run cap (killed by timeout)"
      echo "==================== RAPTOR LOG ===================="
      cat /tmp/raptor.log
      # RAPTOR prints OUTPUT_DIR=<path>; agentic also writes its own run dir there.
      ODIR=$(grep -oE 'OUTPUT_DIR=.*' /tmp/raptor.log | tail -1 | cut -d= -f2-)
      echo "==================== VALIDATED FINDINGS (agentic: validation/findings.json) ===================="
      VF=0
      for f in "$OUT/validation/findings.json" "$OUT/findings.json" "$ODIR/validation/findings.json" "$ODIR/findings.json"; do
        [ -f "$f" ] || continue
        VF=1; echo "--- $f ---"
        jq -r '(.findings // .results // .)[]? | "[\(.severity // .level // "?")] \(.title // .rule // .id // "?")  @ \(.file // .path // .location // "?")\n  \(.description // .message // "")"' "$f" 2>/dev/null || cat "$f"
      done
      [ "$VF" = "0" ] && echo "(no findings.json — agentic filed no validated findings, or wrote elsewhere)"
      echo "==================== SEMGREP (SARIF) ===================="
      for s in $(find "$OUT" -name '*.sarif' 2>/dev/null); do
        echo "--- $s ---"
        jq -r '.runs[].results[]? | "[\(.level // "note")] \(.ruleId): \(.message.text)  @ \(.locations[0].physicalLocation.artifactLocation.uri // "?")"' "$s" 2>/dev/null
      done
      echo "==================== ARTIFACTS (en $OUT y $ODIR) ===================="
      find "$OUT" "$ODIR" -type f 2>/dev/null | sort | head -80
      echo "[gate] raptor exit code: $RC"
      exit $RC
  ran:
    setOutput: raptor.run
    assertReturnCode: 0
