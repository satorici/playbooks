settings:
  name: "RAPTOR - LLM Security Research (local model)"
  description: "Runs RAPTOR in agentic mode against source code: Semgrep static analysis plus LLM-driven exploitability validation, proof-of-concept generation and patch writing, powered by a local model. Choose the model with -d MODEL."
  author:
    - https://github.com/gadievron
  timeout: 28800
  files: false   # findings and report print to stdout as separate test steps below
  example: satori local satori://code/llm/local/raptor.yml --repo OWASP/NodeGoat -d MODEL="qwen3.6-35b" --output

raptor:
  install:
    - test -d /tmp/raptor/.claude || git clone --depth 1 https://github.com/gadievron/raptor.git /tmp/raptor
    - grep -q '"ANTHROPIC_BASE_URL"' /tmp/raptor/core/config/__init__.py || sed -i 's/"_RAPTOR_TRUSTED", "CLAUDECODE",/"_RAPTOR_TRUSTED", "CLAUDECODE", "ANTHROPIC_BASE_URL", "ANTHROPIC_AUTH_TOKEN", "ANTHROPIC_MODEL", "ANTHROPIC_SMALL_FAST_MODEL", "CLAUDE_CODE_DISABLE_1M_CONTEXT", "API_TIMEOUT_MS",/' /tmp/raptor/core/config/__init__.py
    - mkdir -p "$HOME/.config/raptor" && printf '%s\n' '{"proxy_hosts":["localhost","127.0.0.1"]}' > "$HOME/.config/raptor/cc-dispatch-proxy-hosts.json"
    - grep -q 'NO_PROXY.*localhost' /tmp/raptor/core/sandbox/context.py || sed -i 's/"NO_PROXY":[ ]"",[ ]"no_proxy":[ ]"",/"NO_PROXY":"localhost,127.0.0.1", "no_proxy":"localhost,127.0.0.1",/' /tmp/raptor/core/sandbox/context.py
    - grep -q '"--max-budget-usd", "1000.00"' /tmp/raptor/core/llm/cc_adapter.py || sed -i 's/"--max-budget-usd", config.budget_usd,/"--max-budget-usd", "1000.00",/' /tmp/raptor/core/llm/cc_adapter.py
    - grep -q 'timeout=1500,' /tmp/raptor/core/llm/config.py || sed -i 's/timeout=300,/timeout=1500,/' /tmp/raptor/core/llm/config.py
    - command -v uv >/dev/null 2>&1 || curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"; rm -rf /tmp/semgrep /tmp/bin && UV_TOOL_DIR=/tmp UV_TOOL_BIN_DIR=/tmp/bin uv tool install --force --python 3.12 -q semgrep

  run:
    - |
      export ANTHROPIC_BASE_URL="http://localhost:8000"
      export ANTHROPIC_AUTH_TOKEN="local"
      export ANTHROPIC_MODEL="${{MODEL}}"
      export ANTHROPIC_SMALL_FAST_MODEL="${{MODEL}}"
      export CLAUDE_CODE_DISABLE_1M_CONTEXT=1
      export CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1 DISABLE_TELEMETRY=1 DISABLE_AUTOUPDATER=1 DISABLE_ERROR_REPORTING=1
      export API_TIMEOUT_MS=1800000
      export IS_SANDBOX=1
      export _RAPTOR_TRUSTED=1
      export PATH="/tmp/bin:$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
      export UV_CACHE_DIR=/tmp/uv-cache

      TARGET="$(pwd)"; cd /tmp/raptor
      uv run --no-project --python 3.12 --with-requirements /tmp/raptor/requirements.txt python raptor.py agentic --repo "$TARGET" --out /tmp/raptor-out --sandbox none > /tmp/raptor.log 2>&1
  log:
    - cat /tmp/raptor.log

findings:
  list:
    - cat /tmp/raptor-out/validation/findings.json
  critical:
    setOutput: findings.list
    setSeverity: 1
    assertStdoutNotContains: '"severity_assessment": "critical"'
  high:
    setOutput: findings.list
    setSeverity: 2
    assertStdoutNotContains: '"severity_assessment": "high"'
  medium:
    setOutput: findings.list
    setSeverity: 3
    assertStdoutNotContains: '"severity_assessment": "medium"'
  report:
    - cat /tmp/raptor-out/agentic-report.md
