settings:
  name: "CLOC: Count Lines of Code"
  description: "CLOC counts blank lines, comment lines, and physical lines of source code in many programming languages."
  image: satori
  author:
    - https://github.com/AlDanial
  example: satori local ./ --playbook satori://code/cloc.yml --report --output

install:
  cloc:
    - apt-get update -qq && apt-get install -qy cloc >>/dev/null

cloc:
  assertStdoutContains: SUM
  run:
    - cloc .
