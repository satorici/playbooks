settings:
  name: "DNSSEC: Domain Name System Security Extensions validation"
  description: "Checks if a domain has DNSSEC enabled by verifying the presence of DNSKEY and RRSIG records. DNSSEC protects against DNS spoofing and cache poisoning by cryptographically signing DNS responses."
  image: debian
  author:
    - https://github.com/satorici
  example: satori run satori://dns/dnssec.yml -d DOMAIN="satori.ci" --report --output

dnssec:
  install:
    - command -v dig >/dev/null 2>&1 || (export DEBIAN_FRONTEND=noninteractive && apt-get update -qq && apt-get install -qy dnsutils >>/dev/null 2>&1)

  check_dnssec:
    setSeverity: 3
    assertStdoutNotContains: "NO_DNSSEC"
    run:
      - |
        DOMAIN="${{DOMAIN}}"
        echo "=== DNSSEC Validation Check: $DOMAIN ==="
        DNSKEY=$(dig +short DNSKEY "$DOMAIN" 2>/dev/null)
        RRSIG=$(dig +dnssec "$DOMAIN" 2>/dev/null | grep "RRSIG")
        if [ -n "$DNSKEY" ] || [ -n "$RRSIG" ]; then
          echo "DNSSEC_ENABLED: $DOMAIN has DNSSEC configured"
          if [ -n "$DNSKEY" ]; then
            echo "  DNSKEY records found: $(echo "$DNSKEY" | wc -l | tr -d ' ')"
          fi
          if [ -n "$RRSIG" ]; then
            echo "  RRSIG signatures found: $(echo "$RRSIG" | wc -l | tr -d ' ')"
          fi
          DS=$(dig +short DS "$DOMAIN" 2>/dev/null)
          if [ -n "$DS" ]; then
            echo "  DS records found (chain of trust to parent zone)"
          fi
        else
          echo "NO_DNSSEC: $DOMAIN does not have DNSSEC enabled"
          echo "DNS responses are not cryptographically signed"
        fi
